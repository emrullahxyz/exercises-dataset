// ── STATE ──
let currentDay = 'upperA';
let currentLang = 'tr';
let currentExercise = null;

// ── RENDER SESSION ──
function renderSession(dayKey) {
  const session = PLAN[dayKey];

  // Session header
  document.getElementById('sessionTitle').textContent = session.title;
  document.getElementById('sessionSub').textContent   = session.sub;

  const statsEl = document.getElementById('sessionStats');
  statsEl.innerHTML = session.stats.map(s =>
    `<div class="stat-pill"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`
  ).join('');

  // Progress
  const count = session.exercises.length;
  document.getElementById('progressLabel').textContent = `${session.title.replace(/^[^\w]+/,'')} — ${count} egzersiz`;
  document.getElementById('progressPct').textContent   = session.stats.map(s => `${s.v} ${s.l}`).join('  ·  ');
  document.getElementById('progressFill').style.width  = '100%';

  // Grid
  const grid = document.getElementById('exerciseGrid');
  grid.innerHTML = '';

  session.exercises.forEach((ex, i) => {
    const data = BY_NAME[ex.name];
    if (!data) return;

    const card = document.createElement('div');
    card.className = 'ex-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', data.name);

    card.innerHTML = `
      <span class="ex-num">${i + 1}</span>
      <div class="ex-img-wrap" id="img-wrap-${i}-${dayKey}">
        <img src="https://raw.githubusercontent.com/emrullahxyz/exercises-dataset/main/${data.image}" id="img-${i}-${dayKey}" alt="${data.name}" loading="lazy" />
        <div class="ex-play" id="play-${i}-${dayKey}">
          <div class="ex-play-icon">
            <svg viewBox="0 0 16 16"><path d="M4 2l10 6-10 6V2z"/></svg>
          </div>
        </div>
      </div>
      <div class="ex-info" id="info-${i}-${dayKey}" style="cursor: pointer;">
        <div class="ex-name" style="display:flex; justify-content:space-between; align-items:center;">
          <span>${data.name}</span>
          <span style="opacity:0.5; font-size:1.2em;" title="Detayları Gör">ℹ️</span>
        </div>
        <div class="ex-tags">
          <span class="ex-tag ex-tag-target">${data.target}</span>
          <span class="ex-tag ex-tag-equip">${data.equipment}</span>
        </div>
        <div class="ex-sets">${ex.sets}</div>
      </div>
    `;

    grid.appendChild(card);

    const imgWrap = card.querySelector('#img-wrap-' + i + '-' + dayKey);
    const infoWrap = card.querySelector('#info-' + i + '-' + dayKey);
    const imgEl = card.querySelector('#img-' + i + '-' + dayKey);
    const playEl = card.querySelector('#play-' + i + '-' + dayKey);

    imgWrap.addEventListener('click', (e) => {
      e.stopPropagation();
      if (imgEl.dataset.playing === 'true') return;
      imgEl.dataset.playing = 'true';
      playEl.style.opacity = '0';

      const gifUrlBase = "https://raw.githubusercontent.com/emrullahxyz/exercises-dataset/main/" + data.gif_url;
      const jpgUrl = "https://raw.githubusercontent.com/emrullahxyz/exercises-dataset/main/" + data.image;
      
      let loopCount = 0;
      const totalLoops = 3;
      const loopDuration = 3500; // 3.5 seconds per loop

      function playNextLoop() {
        if (loopCount >= totalLoops) {
          imgEl.src = jpgUrl;
          playEl.style.opacity = '';
          imgEl.dataset.playing = 'false';
          return;
        }
        imgEl.src = gifUrlBase + "?t=" + new Date().getTime();
        loopCount++;
        setTimeout(playNextLoop, loopDuration);
      }

      playNextLoop();
    });

    infoWrap.addEventListener('click', () => openModal(data, ex));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(data, ex); });
  });
}


// ── EXERCISE MODAL ──
function openModal(data, planEx) {
  currentExercise = { data, planEx };

  document.getElementById('modalTitle').textContent = data.name;
  document.getElementById('modalGif').src = "https://raw.githubusercontent.com/emrullahxyz/exercises-dataset/main/" + data.gif_url;
  document.getElementById('modalGif').alt = data.name;

  // Meta chips
  document.getElementById('modalMeta').innerHTML = [
    { l: 'Kategori', v: data.category },
    { l: 'Hedef Kas', v: data.target },
    { l: 'Ekipman', v: data.equipment },
    { l: 'Kas Grubu', v: data.muscle_group },
  ].map(m => `
    <div class="meta-chip">
      <span class="meta-label">${m.l}</span>
      <span class="meta-value">${m.v}</span>
    </div>
  `).join('');

  // Plan info
  document.getElementById('modalPlanInfo').innerHTML = `
    <div class="plan-icon">📋</div>
    <div>
      <div class="plan-detail">${planEx.label}</div>
      <div class="plan-setsreps">${planEx.sets} &nbsp;·&nbsp; Progressive Overload uygula</div>
    </div>
  `;

  // Muscles
  const primary = [data.target];
  const secondary = data.secondary_muscles || [];
  document.getElementById('modalMuscles').innerHTML = `
    <div class="section-label">Kaslar</div>
    <div class="muscles-grid">
      <div class="muscles-group">
        <div class="muscles-group-label">Primer</div>
        <div class="muscle-tags">
          ${primary.map(m => `<span class="muscle-tag primary">${m}</span>`).join('')}
        </div>
      </div>
      <div class="muscles-group">
        <div class="muscles-group-label">Sekonder</div>
        <div class="muscle-tags">
          ${secondary.length ? secondary.map(m => `<span class="muscle-tag">${m}</span>`).join('') : '<span class="muscle-tag">—</span>'}
        </div>
      </div>
    </div>
  `;

  renderInstructions(data, currentLang);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderInstructions(data, lang) {
  const steps = (data.instruction_steps || {})[lang] || (data.instruction_steps || {}).en || [];
  const availLangs = Object.keys(data.instruction_steps || {}).filter(l => ['en','tr'].includes(l));

  document.getElementById('modalInstructions').innerHTML = `
    <span class="instructions-label">Nasıl Yapılır?</span>
    <div class="lang-tabs">
      ${availLangs.map(l => `
        <button class="lang-tab${l === lang ? ' active' : ''}" data-lang="${l}">
          ${l === 'tr' ? 'Türkçe' : l === 'en' ? 'English' : l.toUpperCase()}
        </button>
      `).join('')}
    </div>
    <ol class="instructions-list">
      ${steps.map((s, i) => `
        <li class="instruction-step">
          <span class="step-num">${i + 1}</span>
          <span class="step-text">${s}</span>
        </li>
      `).join('')}
    </ol>
  `;

  document.querySelectorAll('.lang-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      renderInstructions(currentExercise.data, currentLang);
    });
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => {
    document.getElementById('modalGif').src = '';
  }, 250);
}

// ── PLAN IMAGE OVERLAY ──
const planOverlay = document.getElementById('planOverlay');
const btnShowPlan = document.getElementById('btnShowPlan');
const planClose = document.getElementById('planClose');

btnShowPlan.addEventListener('click', () => {
  planOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closePlanModal() {
  planOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

planClose.addEventListener('click', closePlanModal);
planOverlay.addEventListener('click', e => {
  if (e.target === e.currentTarget) closePlanModal();
});

// ── TAB SWITCH ──
document.getElementById('dayTabs').addEventListener('click', e => {
  const btn = e.target.closest('.day-tab');
  if (!btn) return;

  document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDay = btn.dataset.day;
  renderSession(currentDay);
});

// ── MODAL CLOSE ──
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { 
  if (e.key === 'Escape') {
    closeModal();
    closePlanModal();
  }
});

// ── INIT ──
renderSession('upperA');
</script>
