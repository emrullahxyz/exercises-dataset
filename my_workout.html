<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Benim Antrenman Planım</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161f;
      --surface2:  #1a1e2a;
      --surface3:  #20253a;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --orange:    #f97316;
      --green:     #22d3a5;
      --blue:      #38bdf8;
      --red:       #f87171;
      --text1:     #f0f2ff;
      --text2:     #94a3b8;
      --text3:     #4a5568;
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text1);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(13, 15, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(108,99,255,0.35);
    }

    .logo-text {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, var(--text1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      border: 1px solid;
    }

    .badge-purple { background: rgba(108,99,255,0.12); color: var(--accent2); border-color: rgba(108,99,255,0.25); }
    .badge-green  { background: rgba(34,211,165,0.10); color: var(--green);   border-color: rgba(34,211,165,0.22); }
    .badge-orange { background: rgba(249,115,22,0.10); color: var(--orange);  border-color: rgba(249,115,22,0.22); }

    /* ── BUTTONS ── */
    .btn-plan {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.22);
      border-radius: var(--r-sm);
      color: var(--orange);
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-plan:hover {
      background: var(--orange);
      color: #000;
      box-shadow: 0 4px 14px rgba(249,115,22,0.3);
    }
    .btn-plan svg { width: 14px; height: 14px; }

    /* ── MAIN ── */
    .main { padding: 32px 28px 80px; max-width: 1320px; margin: 0 auto; }

    /* ── DAY TABS ── */
    .day-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .day-tab {
      padding: 8px 18px;
      border-radius: var(--r-md);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.18s;
      letter-spacing: -0.01em;
    }

    .day-tab:hover {
      border-color: var(--border2);
      color: var(--text1);
      background: var(--surface2);
    }

    .day-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 18px rgba(108,99,255,0.3);
    }

    .day-tab.squash {
      border-color: rgba(34,211,165,0.3);
      color: var(--green);
    }
    .day-tab.squash.active {
      background: var(--green);
      border-color: var(--green);
      color: #000;
      box-shadow: 0 4px 18px rgba(34,211,165,0.3);
    }

    /* ── SESSION HEADER ── */
    .session-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
    }

    .session-title { font-size: 22px; font-weight: 800; letter-spacing: -0.04em; }
    .session-sub   { color: var(--text2); font-size: 13px; margin-top: 3px; }

    .session-stats {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .stat-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      gap: 2px;
    }

    .stat-val { font-size: 16px; font-weight: 700; }
    .stat-lbl { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── EXERCISE GRID ── */
    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }

    .ex-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .ex-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(108,99,255,0.2);
    }

    .ex-num {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 24px; height: 24px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text1);
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
    }

    .ex-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface2);
      overflow: hidden;
    }

    .ex-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .ex-card:hover .ex-img-wrap img {
      transform: scale(1.04);
    }

    .ex-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(108,99,255,0);
      transition: background 0.2s;
    }

    .ex-card:hover .ex-play {
      background: rgba(108,99,255,0.18);
    }

    .ex-play-icon {
      width: 40px; height: 40px;
      background: rgba(108,99,255,0.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.7);
      transition: all 0.2s;
    }

    .ex-card:hover .ex-play-icon {
      opacity: 1;
      transform: scale(1);
    }

    .ex-play-icon svg { width: 16px; height: 16px; fill: #fff; margin-left: 2px; }

    .ex-info {
      padding: 10px 12px 12px;
    }

    .ex-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text1);
      line-height: 1.4;
      text-transform: capitalize;
      margin-bottom: 6px;
    }

    .ex-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ex-tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid;
      text-transform: capitalize;
    }

    .ex-tag-target {
      background: rgba(108,99,255,0.1);
      color: var(--accent2);
      border-color: rgba(108,99,255,0.22);
    }

    .ex-tag-equip {
      background: var(--surface2);
      color: var(--text2);
      border-color: var(--border);
    }

    .ex-sets {
      margin-top: 7px;
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: -0.01em;
    }

    /* ── SQUASH DAY ── */
    .squash-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      gap: 16px;
      text-align: center;
    }

    .squash-emoji {
      font-size: 72px;
      filter: drop-shadow(0 8px 24px rgba(34,211,165,0.4));
    }

    .squash-title { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; }
    .squash-sub   { color: var(--text2); font-size: 15px; max-width: 400px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      padding: 16px;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-panel {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl);
      width: min(680px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      transform: translateY(16px) scale(0.97);
      transition: transform 0.22s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .modal-overlay.open .modal-panel {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 0;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-transform: capitalize;
      line-height: 1.3;
    }

    .modal-close {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      margin-top: 2px;
    }

    .modal-close:hover {
      background: rgba(108,99,255,0.15);
      border-color: var(--accent);
      color: var(--accent2);
    }

    .modal-gif-wrap {
      padding: 14px 20px 0;
    }

    .modal-gif {
      width: 100%;
      max-height: 340px;
      object-fit: contain;
      border-radius: var(--r-md);
      background: var(--surface2);
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 20px 0;
    }

    .meta-chip {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
    }

    .meta-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); }
    .meta-value { font-size: 13px; font-weight: 600; color: var(--text1); text-transform: capitalize; }

    .modal-plan-info {
      margin: 12px 20px 0;
      padding: 12px 14px;
      background: rgba(108,99,255,0.08);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .plan-icon { font-size: 20px; }
    .plan-detail { font-size: 13px; color: var(--accent2); font-weight: 600; }
    .plan-setsreps { font-size: 11px; color: var(--text2); margin-top: 1px; }

    .modal-muscles {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .muscles-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .muscles-group {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 12px;
    }

    .muscles-group-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text3);
      margin-bottom: 7px;
    }

    .muscle-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .muscle-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      text-transform: capitalize;
      background: var(--surface3);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .muscle-tag.primary {
      background: rgba(108,99,255,0.2);
      color: var(--accent2);
      border-color: rgba(108,99,255,0.3);
      font-weight: 600;
    }

    .modal-instructions { padding: 0 20px 24px; }

    .instructions-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      padding: 14px 0 0;
      display: block;
    }

    .lang-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin: 10px 0 14px;
    }

    .lang-tab {
      font-size: 13px;
      font-weight: 500;
      padding: 8px 20px;
      color: var(--text2);
      cursor: pointer;
      position: relative;
      transition: color 0.15s;
    }

    .lang-tab:hover { color: var(--text1); }
    .lang-tab.active { color: var(--text1); font-weight: 600; }

    .lang-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    .instructions-list { display: flex; flex-direction: column; gap: 8px; }

    .instruction-step { display: flex; gap: 10px; align-items: flex-start; }

    .step-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent2);
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }

    .step-text { font-size: 13px; line-height: 1.6; color: var(--text2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .header-meta .badge { display: none; }
      .main { padding: 20px 16px 60px; }
      .session-header { flex-direction: column; }
      .exercise-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .modal-panel { max-height: 92dvh; }
      .muscles-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .exercise-grid { grid-template-columns: repeat(2, 1fr); }
      .modal-panel { border-radius: var(--r-xl) var(--r-xl) 0 0; }
      .modal-overlay { align-items: flex-end; padding: 0; }
      .header-meta .badge { display: none; }
      .btn-plan { font-size: 11px; padding: 6px 10px; }
      .btn-plan svg { width: 14px; height: 14px; }
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      margin-bottom: 24px;
    }
    .progress-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-logo">
    <div class="logo-icon">💪</div>
    <div class="logo-text">Antrenman Planım</div>
  </div>
  <div class="header-meta">
    <button class="btn-plan" id="btnShowPlan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      Özet Görseli
    </button>
    <span class="badge badge-purple">Upper / Lower Split</span>
    <span class="badge badge-green">3–4 Gün</span>
    <span class="badge badge-orange">Haziran 2026</span>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="main">

  <!-- Day Tabs -->
  <div class="day-tabs" id="dayTabs">
    <button class="day-tab active" data-day="upperA">🔵 Upper A — İtme</button>
    <button class="day-tab" data-day="lowerFull">🟢 Lower — Tam Bacak</button>
    <button class="day-tab" data-day="upperB">🔴 Upper B — Çekiş</button>
    <button class="day-tab" data-day="lowerA">🟢 Lower A — Quad</button>
    <button class="day-tab" data-day="lowerB">🟠 Lower B — Posterior</button>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-label">
      <span id="progressLabel">Upper A — 8 egzersiz</span>
      <span id="progressPct">4×5–6 → 4×12–15</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
  </div>

  <!-- Session Header -->
  <div class="session-header" id="sessionHeader">
    <div>
      <div class="session-title" id="sessionTitle">🔵 Upper A — İtme</div>
      <div class="session-sub" id="sessionSub">Göğüs · Omuz · Triceps · Core</div>
    </div>
    <div class="session-stats" id="sessionStats"></div>
  </div>

  <!-- Exercise Grid -->
  <div class="exercise-grid" id="exerciseGrid"></div>

</main>

<!-- ── EXERCISE MODAL ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-panel" id="modalPanel">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle"></h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-gif-wrap">
      <img class="modal-gif" id="modalGif" alt="" />
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-plan-info" id="modalPlanInfo"></div>
    <div class="modal-muscles" id="modalMuscles"></div>
    <div class="modal-instructions" id="modalInstructions"></div>
  </div>
</div>

<!-- ── IMAGE PLAN OVERLAY ── -->
<div class="modal-overlay" id="planOverlay">
  <div class="modal-panel" style="width: min(850px, 100%);">
    <div class="modal-header">
      <h2 class="modal-title">Haftalık Antrenman Planı</h2>
      <button class="modal-close" id="planClose">✕</button>
    </div>
    <div class="modal-gif-wrap" style="padding: 18px;">
      <img src="workout_new.png" alt="Workout Plan" style="width: 100%; border-radius: var(--r-md); box-shadow: 0 10px 40px rgba(0,0,0,0.5);" />
    </div>
  </div>
</div>

<script>
// ── EXERCISE DATA ──
const EXERCISES_RAW = ﻿[{"id":"0025","name":"barbell bench press","category":"chest","body_part":"chest","equipment":"barbell","instructions":{"en":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the barbell with an overhand grip slightly wider than shoulder-width apart. Lift the barbell off the rack and hold it directly above your chest with your arms fully extended. Lower the barbell slowly towards your chest, keeping your elbows tucked in. Pause for a moment when the barbell touches your chest. Push the barbell back up to the starting position by extending your arms. Repeat for the desired number of repetitions.","it":"Sdraiati su una panca con i piedi appoggiati a terra e la schiena premuta contro la panca. Afferrare il bilanciere con una presa prona leggermente più larga della larghezza delle spalle. Solleva il bilanciere dal rack e tienilo direttamente sopra il petto con le braccia completamente distese. Abbassa lentamente il bilanciere verso il petto, tenendo i gomiti piegati. Fai una pausa per un momento quando il bilanciere tocca il petto. Spingi il bilanciere nella posizione iniziale estendendo le braccia. Ripetere per il numero di ripetizioni desiderato.","tr":"Ayaklarınız yere düz basacak ve sırtınız banka yaslanacak şekilde bir bankın üzerine düz bir şekilde uzanın. Halteri omuz genişliğinden biraz daha geniş olacak şekilde üstten kavrayın. Halteri raftan kaldırın ve kollarınız tamamen uzatılmış halde doğrudan göğsünüzün üzerinde tutun. Dirseklerinizi içeride tutarak halteri yavaşça göğsünüze doğru indirin. Halter göğsünüze dokunduğunda bir an duraklayın. Kollarınızı uzatarak halteri başlangıç ​​pozisyonuna doğru itin. İstenilen sayıda tekrar için tekrarlayın.","es":"Túmbate sobre un banco con los pies apoyados en el suelo y la espalda presionada contra el banco. Agarra la barra con un agarre pronado un poco más ancho que la separación de los hombros. Levanta la barra del soporte y sostenla directame  iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Ayaklarınız omuz genişliğinde açık ve dizleriniz hafifçe bükülü şekilde ayakta durun.","Sırtınızı düz ve göğsünüzü yukarıda tutarak kalçalarınızdan öne doğru eğin.","Halteri üstten kavrayarak, eller omuz genişliğinden biraz daha geniş olacak şekilde kavrayın.","Kürek kemiklerinizi geri çekerek ve sırt kaslarınızı sıkarak halteri alt göğsünüze doğru çekin.","Tepe noktasında bir süre duraklayın, ardından halteri yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ponte de pie con los pies separados a la altura de los hombros y las rodillas ligeramente flexionadas.","Inclínate hacia delante desde las caderas manteniendo la espalda recta y el pecho elevado.","Agarra la barra con un agarre pronado, con las manos un poco más separadas que el ancho de los hombros.","Tira de la barra hacia la parte inferior del pecho retrayendo los omóplatos y contrayendo los músculos de la espalda.","Haz una pausa breve en la parte alta y luego baja lentamente la barra de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"biceps","secondary_muscles":["biceps","forearms"],"target":"upper back","image":"images/0027-eZyBC3j.jpg","gif_url":"videos/0027-eZyBC3j.gif","created_at":"2026-03-18T12:31:32.870309+00:00"},{"id":"0031","name":"barbell curl","category":"upper arms","body_part":"upper arms","equipment":"barbell","instructions":{"en":"Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing forward. Keep your elbows close to your torso and exhale as you curl the weights while contracting your biceps. Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale as you slowly begin to lower the bar back to the starting position. Repeat for the desired number of repetitions.","it":"Stai dritto con i piedi alla larghezza delle spalle e tieni un bilanciere con una presa subdola, con i palmi rivolti in avanti. Tieni i gomiti vicini al busto ed espira mentre pieghi i pesi mentre contrai i bicipiti. Continua a sollevare la barra finché i bicipiti non sono completamente contratti e la barra è all\u0027altezza delle spalle. Mantieni la posizione contratta per una breve pausa mentre contrai i bicipiti. Inspira mentre inizi lentamente ad abbassare la barra nella posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Ayaklarınız omuz genişliğinde açık olacak şekilde dik durun ve halteri avuç içleriniz öne bakacak şekilde alttan kavrayarak tutun. Dirseklerinizi gövdenize yakın tutun ve bicepslerinizi kasarken ağırlıkları kıvırırken nefes verin. Bicepsleriniz tamamen kasılana ve bar omuz hizasına gelinceye kadar barı kaldırmaya devam edin. Bicepslerinizi sıkarken kasılmış pozisyonu kısa bir süre koruyun. Çubuğu yavaşça başlangıç ​​pozisyonuna indirmeye başlarken nefes alın. İstenilen sayıda tekrar için tekrarlayın.","es":"Ponte de pie con los pies separados a la altura de los hombros y sujeta una barra con un agarre supino, con las palmas mirando hacia delante. Mantén los codos cerca del torso y exhala mientras levantas el peso contrayendo los bíceps. Continúa levantando la barra hasta que los bíceps estén completamente contraídos y la barra esté a la altura de los hombros. Mantén la posición contraída durante una breve pausa mientras aprietas los bíceps. Inhala mientras comienzas a bajar lentamente la barra de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing forward.","Keep your elbows close to your torso and exhale as you curl the weights while contracting your biceps.","Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale as you slowly begin to lower the bar back to the starting position.","Repeat for the desired number of repetitions."],"it":["Stai dritto con i piedi alla larghezza delle spalle e tieni un bilanciere con una presa subdola, con i palmi rivolti in avanti.","Tieni i gomiti vicini al busto ed espira mentre pieghi i pesi mentre contrai i bicipiti.","Continua a sollevare la barra finché i bicipiti non sono completamente contratti e la barra è all\u0027altezza delle spalle.","Mantieni la posizione contratta per una breve pausa mentre contrai i bicipiti.","Inspira mentre inizi lentamente ad abbassare la barra nella posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Ayaklarınız omuz genişliğinde açık olacak şekilde dik durun ve halteri avuç içleriniz öne bakacak şekilde alttan kavrayarak tutun.","Dirseklerinizi gövdenize yakın tutun ve bicepslerinizi kasarken ağırlıkları kıvırırken nefes verin.","Bicepsleriniz tamamen kasılana ve bar omuz hizasına gelinceye kadar barı kaldırmaya devam edin.","Bicepslerinizi sıkarken kasılmış pozisyonu kısa bir süre koruyun.","Çubuğu yavaşça başlangıç ​​pozisyonuna indirmeye başlarken nefes alın.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ponte de pie con los pies separados a la altura de los hombros y sujeta una barra con un agarre supino, con las palmas mirando hacia delante.","Mantén los codos cerca del torso y exhala mientras levantas el peso contrayendo los bíceps.","Continúa levantando la barra hasta que los bíceps estén completamente contraídos y la barra esté a la altura de los hombros.","Mantén la posición contraída durante una breve pausa mientras aprietas los bíceps.","Inhala mientras comienzas a bajar lentamente la barra de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"forearms","secondary_muscles":["forearms"],"target":"biceps","image":"images/0031-25GPyDY.jpg","gif_url":"videos/0031-25GPyDY.gif","created_at":"2026-03-18T12:31:32.870407+00:00"},{"id":"0043","name":"barbell full squat","category":"upper legs","body_part":"upper legs","equipment":"barbell","instructions":{"en":"Stand with your feet shoulder-width apart, toes slightly turned out. Hold the barbell across your upper back, resting it on your traps or rear delts. Engage your core and keep your chest up as you begin to lower your body down. Bend at the knees and hips, pushing your hips back and down as if sitting into a chair. Lower yourself until your thighs are parallel to the ground or slightly below. Keep your knees in line with your toes and your weight in your heels. Drive through your heels to stand back up, extending your hips and knees. Repeat for the desired number of repetitions.","it":"Stai con i piedi alla larghezza delle spalle, le dita leggermente rivolte verso l\u0027esterno. Tieni il bilanciere sulla parte superiore della schiena, appoggiandolo sulle trappole o sui deltoidi posteriori. Coinvolgi il tuo core e mantieni il petto sollevato mentre inizi ad abbassare il corpo. Piega le ginocchia e i fianchi, spingendo i fianchi indietro e in basso come se fossi seduto su una sedia. Abbassati finché le cosce non sono parallele al suolo o leggermente più in basso. Tieni le ginocchia in linea con le dita dei piedi e il peso sui talloni. Spingi i talloni per rialzarti, estendendo i fianchi e le ginocchia. Ripetere per il numero di ripetizioni desiderato.","tr":"Ayaklarınız omuz genişliğinde açık, ayak parmaklarınız hafifçe dışa dönük olacak şekilde ayakta durun. Halterinizi sırtınızın üst kısmında tutun ve trapezlerinize veya arka deltalarınıza dayayın. Vücudunuzu aşağı indirmeye başladığınızda merkez bölgenizi devreye sokun ve göğsünüzü yukarıda tutun. Dizlerinizi ve kalçalarınızı bükün, sanki bir sandalyeye oturuyormuş gibi kalçalarınızı geriye ve aşağı doğru itin. Uyluklarınız yere paralel veya biraz aşağıda oluncaya kadar kendinizi indirin. Dizlerinizi ayak parmaklarınızla aynı hizada ve ağırlığınızı topuklarınızda tutun. Kalçalarınızı ve dizlerinizi uzatarak ayağa kalkmak için topuklarınızı kullanın. İstenilen sayıda tekrar için tekrarlayın.","es":"Ponte de pie con los pies separados a la altura de los hombros, con los dedos de los pies ligeramente hacia afuera. Sujeta la barra sobre la parte superior de la espalda, apoyándola en los trapecios o los deltoides posteriores. Activa el core y mantén el pecho elevado mientras comienzas a bajar el cuerpo. Flexiona las rodillas y las caderas, empujando las caderas hacia atrás y hacia abajo como si te sentaras en una silla. Baja hasta que los muslos queden paralelos al suelo o un poco por debajo. Mantén las rodillas alineadas con los dedos de los pies y el peso sobre los talones. Empuja con los talones para volver a ponerte de pie, extendiendo las caderas y las rodillas. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Stand with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you begin to lower your body down.","Bend at the knees and hips, pushing your hips back and down as if sitting into a chair.","Lower yourself until your thighs are parallel to the ground or slightly below.","Keep your knees in line with your toes and your weight in your heels.","Drive through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."],"it":["Stai con i piedi alla larghezza delle spalle, le dita leggermente rivolte verso l\u0027esterno.","Tieni il bilanciere sulla parte superiore della schiena, appoggiandolo sulle trappole o sui deltoidi posteriori.","Coinvolgi il tuo core e mantieni il petto sollevato mentre inizi ad abbassare il corpo.","Piega le ginocchia e i fianchi, spingendo i fianchi indietro e in basso come se fossi seduto su una sedia.","Abbassati finché e","category":"upper legs","body_part":"upper legs","equipment":"barbell","instructions":{"en":"Start by lying flat on your back on the ground with your knees bent and feet flat on the floor. Place a barbell across your hips, holding it securely with both hands. Engage your glutes and core muscles, then lift your hips off the ground until your body forms a straight line from your knees to your shoulders. Pause for a moment at the top, squeezing your glutes. Slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions.","it":"Inizia sdraiandoti sulla schiena a terra con le ginocchia piegate e i piedi appoggiati sul pavimento. Posiziona un bilanciere sui fianchi, tenendolo saldamente con entrambe le mani. Coinvolgi i glutei e i muscoli centrali, quindi solleva i fianchi da terra finché il tuo corpo non forma una linea retta dalle ginocchia alle spalle. Fermati un attimo in alto, contraendo i glutei. Abbassa lentamente i fianchi fino alla posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Dizleriniz bükülmüş ve ayaklarınız yere düz basacak şekilde yere sırt üstü uzanarak başlayın. Kalçalarınızın üzerine bir halter yerleştirin ve iki elinizle güvenli bir şekilde tutun. Kalça kaslarınızı ve göbek kaslarınızı çalıştırın, ardından vücudunuz dizlerinizden omuzlarınıza kadar düz bir çizgi oluşturana kadar kalçalarınızı yerden kaldırın. Kalça kaslarınızı sıkarak tepede bir an duraklayın. Kalçalarınızı yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Empieza tumbado boca arriba en el suelo con las rodillas flexionadas y los pies planos sobre el suelo. Coloca una barra sobre las caderas, sujetándola con firmeza con ambas manos. Activa los glúteos y el core, luego levanta las caderas del suelo hasta que el cuerpo forme una línea recta desde las rodillas hasta los hombros. Haz una pausa breve en la parte alta, apretando los glúteos. Baja lentamente las caderas de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Start by lying flat on your back on the ground with your knees bent and feet flat on the floor.","Place a barbell across your hips, holding it securely with both hands.","Engage your glutes and core muscles, then lift your hips off the ground until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, squeezing your glutes.","Slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."],"it":["Inizia sdraiandoti sulla schiena a terra con le ginocchia piegate e i piedi appoggiati sul pavimento.","Posiziona un bilanciere sui fianchi, tenendolo saldamente con entrambe le mani.","Coinvolgi i glutei e i muscoli centrali, quindi solleva i fianchi da terra finché il tuo corpo non forma una linea retta dalle ginocchia alle spalle.","Fermati un attimo in alto, contraendo i glutei.","Abbassa lentamente i fianchi fino alla posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Dizleriniz bükülmüş ve ayaklarınız yere düz basacak şekilde yere sırt üstü uzanarak başlayın.","Kalçalarınızın üzerine bir halter yerleştirin ve iki elinizle güvenli bir şekilde tutun.","Kalça kaslarınızı ve göbek kaslarınızı çalıştırın, ardından vücudunuz dizlerinizden omuzlarınıza kadar düz bir çizgi oluşturana kadar kalçalarınızı yerden kaldırın.","Kalça kaslarınızı sıkarak tepede bir an duraklayın.","Kalçalarınızı yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Empieza tumbado boca arriba en el suelo con las rodillas flexionadas y los pies planos sobre el suelo.","Coloca una barra sobre las caderas, sujetándola con firmeza con ambas manos.","Activa los glúteos y el core, luego levanta las caderas del suelo hasta que el cuerpo forme una línea recta desde las rodillas hasta los hombros.","Haz una pausa breve en la parte alta, apretando los glúteos.","Baja lentamente las caderas de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"hamstrings","secondary_muscles":["hamstrings","lower back"],"target":"glutes","image":"images/1409-qKBpF7I.jpg","gif_url":"videos/1409-qKBpF7I.gif","created_at":"2026-03-18T12:31:32.871614+00:00"},{"id":"0085","name":"barbell romanian deadlift","category":"upper legs","body_part":"upper legs","equipment":"barbell","instructions":{"en":"Stand with your feet shoulder-width apart and your toes pointing forward. Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Bend at the hips, keeping your back straight and your knees slightly bent. Lower the barbell towards the ground, keeping it close to your body. Feel the stretch in your hamstrings as you lower the barbell. Once you feel a stretch in your hamstrings, push your hips forward and stand up straight. Squeeze your glutes at the top of the movement. Lower the barbell back down to the starting position and repeat for the desired number of repetitions.","it":"Stai con i piedi alla larghezza delle spalle e le dita dei piedi rivolte in avanti. Tieni il bilanciere con una presa prona, con le mani leggermente più larghe della larghezza delle spalle. Piegati sui fianchi, mantenendo la schiena dritta e le ginocchia leggermente piegate. Abbassa il bilanciere verso terra, tenendolo vicino al corpo. Senti l\u0027allungamento dei muscoli posteriori della coscia mentre abbassi il bilanciere. Una volta che senti un allungamento nei muscoli posteriori della coscia, spingi i fianchi in avanti e stai dritto. Contrai i glutei nella parte superiore del movimento. Abbassare nuovamente il bilanciere nella posizione iniziale e ripetere per il numero di ripetizioni desiderato.","tr":"Ayaklarınız omuz genişliğinde açık ve ayak parmaklarınız ileriyi gösterecek şekilde ayakta durun. Halteri üstten kavrayarak tutun, eller omuz genişliğinden biraz daha açık olsun. Kalçalarınızı bükün, sırtınızı düz tutun ve dizlerinizi hafifçe bükün. Halteri vücudunuza yakın tutarak yere doğru indirin. Halteri indirirken diz arkası kaslarınızın gerginliğini hissedin. Diz arkası kaslarınızın gerildiğini hissettiğinizde kalçalarınızı öne doğru itin ve dik durun. Hareketin üst noktasında kalçalarınızı sıkın. Halteri başlangıç ​​pozisyonuna indirin ve istenilen sayıda tekrar yapın.","es":"Ponte de pie con los pies separados a la altura de los hombros y los dedos de los pies apuntando hacia delante. Sujeta la barra con un agarre pronado, manos un poco más separadas que el ancho de los hombros. Flexiona las caderas, manteniendo la espalda recta y las rodillas ligeramente flexionadas. Baja la barra hacia el suelo, manteniéndola cerca del cuerpo. Siente el estiramiento en los isquiotibiales mientras bajas la barra. Cuando sientas el estiramiento en los isquiotibiales, empuja las caderas hacia delante y ponte de pie. Aprieta los glúteos en la parte alta del movimiento. Baja la barra de vuelta a la posición inicial y repite el número de repeticiones deseado."},"instruction_steps":{"en":["Stand with your feet shoulder-width apart and your toes pointing forward.","Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Bend at the hips, keeping your back straight and your knees slightly bent.","Lower the barbell towards the ground, keeping it close to your body.","Feel the stretch in your hamstrings as you lower the barbell.","Once you feel a stretch in your hamstrings, push your hips forward and stand up straight.","Squeeze your glutes at the top of the movement.","Lower the barbell back down to the starting position and repeat for the desired number of repetitions."],"it":["Stai con i piedi alla larghezza delle spalle e le dita dei piedi rivolte in avanti.","Tieni il bilanciere con una presa prona, con le mani leggermente più larghe della larghezza delle spalle.","Piegati sui fianchi, mantenendo la schiena dritta e le ginocchia leggermente piegate.","Abbassa il bilanciere verso terra, tenendolo vicino al corpo.","Senti l\u0027allungamento dei muscoli posteriori della coscia mentre abbassi il bilanciere.","Una volta che senti un allungamento nei muscoli posteriori della coscia, spingi i fianchi in avanti e stai dritto.","Contrai i glutei nella parte superiore del movimento.","Abbassare nuovamente il bilanciere nella posizione iniziale e ripetere per il numero di ripetizioni desiderato."],"tr":["Ayaklarınız omuz genişliğinde açık ve ayak parmaklarınız ileriyi gösterecek şekilde ayakta durun.","Halteri üstten kavrayarak tutun, eller omuz genişliğinden biraz daha açık olsun.","Kalçalarınızı bükün, sırtınızı düz tutun ve dizlerinizi hafifçe bükün.","Halteri vücudunuza yakın tutarak yere doğru indirin.","Halteri indirirken diz arkası kaslarınızın gerginliğini hissedin.","Diz arkası kaslarınızın gerildiğini hissettiğinizde kalçalarınızı öne doğru itin ve dik durun.","Hareketin üst noktasında kalçalarınızı sıkın.","Halteri başlangıç ​​pozisyonuna indirin ve istenilen sayıda tekrar yapın."],"es":["Ponte de pie con los pies separados a la altura de los hombros y los dedos de los pies apuntando hacia delante.","Sujeta la barra con un agarre pronado, manos un poco más separadas que el ancho de los hombros.","Flexiona las caderas, manteniendo la espalda recta y las rodillas ligeramente flexionadas.","Baja la barra hacia el suelo, manteniéndola cerca del cuerpo.","Siente el estiramiento en los isquiotibiales mientras bajas la barra.","Cuando sientas el estiramiento en los isquiotibiales, empuja las caderas hacia delante y ponte de pie.","Aprieta los glúteos en la parte alta del movimiento.","Baja la barra de vuelta a la posición inicial y repite el número de repeticiones deseado."]},"muscle_group":"hamstrings","secondary_muscles":["hamstrings","lower back"],"target":"glutes","image":"images/0085-wQ2c4XD.jpg","gif_url":"videos/0085-wQ2c4XD.gif","created_at":"2026-03-18T12:31:32.872608+00:00"},{"id":"0099","name":"barbell single leg split squat","category":"upper legs","body_part":"upper legs","equipment":"barbell","instructions":{"en":"Stand with your feet shoulder-width apart, holding a barbell across your upper back. Take a large step forward with one leg, keeping your torso upright. Lower your body by bending your front knee and hip, while keeping your back leg straight. Continue lowering until your front thigh is parallel to the ground. Pause for a moment, then push through your front heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs.","it":"Stai con i piedi divaricati alla larghezza delle spalle, tenendo una barra sulla parte alta della schiena. Fai un grande passo avanti con una gamba, mantenendo il busto dritto. Abbassa il corpo piegando il ginocchio anteriore e il fianco, mantenendo la gamba posteriore dritta. Continua ad abbassare finché la coscia anteriore non è parallela al suolo. Fermati un attimo, poi spingi attraverso il tallone anteriore per tornare alla posizione di partenza. Ripeti per il numero desiderato di ripetizioni, poi cambia gamba.","tr":"Ayaklarınız omuz genişliğinde açık olacak şekilde ayakta durun ve halterinizi sırtınızın üst kısmına doğru tutun. Gövdenizi dik tutarak tek ayağınızla ileriye doğru büyük bir adım atın. Arka bacağınızı düz tutarken ön dizinizi ve kalçanızı bükerek vücudunuzu indirin. Ön uyluğunuz yere paralel oluncaya kadar indirmeye devam edin. Bir an duraklayın, ardından başlangıç ​​pozisyonuna dönmek için ön topuğunuzu itin. İstenilen tekrar sayısı kadar tekrarlayın, ardından bacakları değiştirin.","es":"Ponte de pie con los pies separados a la altura de los hombros, sujetando una barra sobre la parte superior de la espalda. Da un paso grande hacia adelante con una pierna, manteniendo el torso erguido. Baja el cuerpo flexionando la rodilla delantera y la cadera, mientras mantienes la pierna trasera recta. Continúa bajando hasta que el muslo delantero quede paralelo al suelo. Haz una pausa breve, luego empuja con el talón delantero para volver a la posición inicial. Repite el número de repeticiones deseado, luego cambia de pierna."},"instruction_steps":{"en":["Stand with your feet shoulder-width apart, holding a barbell across your upper back.","Take a large step forward with one leg, keeping your torso upright.","Lower your body by bending your front knee and hip, while keeping your back leg straight.","Continue lowering until your front thigh is parallel to the ground.","Pause for a moment, then push through your front heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."],"it":["Stai con i piedi divaricati alla larghezza delle spalle, tenendo una barra sulla parte alta della schiena.","Fai un grande passo avanti con una gamba, mantenendo il busto dritto.","Abbassa il corpo piegando il ginocchio anteriore e il fianco, mantenendo la gamba posteriore dritta.","Continua ad abbassare finché la coscia anteriore non è parallela al suolo.","Fermati un attimo, poi spingi attraverso il tallone anteriore per tornare alla posizione di partenza.","Ripeti per il numero desiderato di ripetizioni, poi cambia gamba."],"tr":["Ayaklarınız omuz genişliğinde açık olacak şekilde ayakta durun ve halterinizi sırtınızın üst kısmına doğru tutun.","Gövdenizi dik tutarak tek ayağınızla ileriye doğru büyük bir adım atın.","Arka bacağınızı düz tutarken ön dizinizi ve kalçanızı bükerek vücudunuzu indirin.","Ön uyluğunuz yere paralel oluncaya kadar indirmeye devam edin.","Bir an duraklayın, ardından başlangıç ​​pozisyonuna dönmek için ön topuğunuzu itin.","İstenilen tekrar sayısı kadar tekrarlayın, ardından bacakları değiştirin."],"es":["Ponte de pie con los pies separados a la altura de los hombros, sujetando una barra sobre la parte superior de la espalda.","Da un paso grande hacia adelante con una pierna, manteniendo el torso erguido.","Baja el cuerpo flexionando la rodilla delantera y la cadera, mientras mantienes la pierna trasera recta.","Continúa bajando hasta que el muslo delantero quede paralelo al suelo.","Haz una pausa breve, luego empuja con el talón delantero para volver a la posición inicial.","Repite el número de repeticiones deseado, luego cambia de pierna."]},"muscle_group":"glutes","secondary_muscles":["glutes","hamstrings","calves"],"target":"quads","image":"images/0099-gGNQmVt.jpg","gif_url":"videos/0099-gGNQmVt.gif","created_at":"2026-03-18T12:31:32.87289+00:00"},{"id":"0171","name":"cable incline fly","category":"chest","body_part":"chest","equipment":"cable","instructions":{"en":"Adjust the cable machine to a low position and attach the handles. Sit on an incline bench with your back against the pad and feet flat on the floor. Grasp the handles with an overhand grip and extend your arms straight out in front of you. Keeping a slight bend in your elbows, open your arms out to the sides in a controlled motion. Pause for a moment at the fully extended position, then slowly return to the starting position. Repeat for the desired number of repetitions.","it":"Regola la macchina a cavo in posizione bassa e fissa le maniglie. Siediti su una panca inclinata con la schiena appoggiata al cuscinetto e i piedi piatti sul pavimento. Afferra i manici con una presa sopra la mano e estendi le braccia dritte davanti a te. Mantenendo una leggera piega dei gomiti, apri le braccia ai lati in un movimento controllato. Fermati un attimo nella posizione completamente estesa, poi torna lentamente alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Kablo makinesini alçak konuma ayarlayın ve kolları takın. Sırtınız yastığa dayalı ve ayaklarınız yere düz basacak şekilde eğimli bir bankta oturun. Tutma yerlerini üstten kavrayın ve kollarınızı düz bir şekilde önünüze doğru uzatın. Dirseklerinizi hafif bükerek kollarınızı kontrollü bir hareketle yanlara doğru açın. Tamamen uzatılmış pozisyonda bir an duraklayın, ardından yavaşça başlangıç ​​pozisyonuna dönün. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta la máquina de cable a una posición baja y sujeta las agarraderas. Siéntate en un banco inclinado con la espalda apoyada en el respaldo y los pies planos en el suelo. Sujeta las agarraderas con un agarre prono y extiende los brazos rectos frente a ti. Manteniendo una ligera flexión en los codos, abre los brazos hacia los lados con un movimiento controlado. Haz una pausa breve en la posición completamente extendida, luego vuelve lentamente a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the cable machine to a low position and attach the handles.","Sit on an incline bench with your back against the pad and feet flat on the floor.","Grasp the handles with an overhand grip and extend your arms straight out in front of you.","Keeping a slight bend in your elbows, open your arms out to the sides in a controlled motion.","Pause for a moment at the fully extended position, then slowly return to the starting position.","Repeat for the desired number of repetitions."],"it":["Regola la macchina a cavo in posizione bassa e fissa le maniglie.","Siediti su una panca inclinata con la schiena appoggiata al cuscinetto e i piedi piatti sul pavimento.","Afferra i manici con una presa sopra la mano e estendi le braccia dritte davanti a te.","Mantenendo una leggera piega dei gomiti, apri le braccia ai lati in un movimento controllato.","Fermati un attimo nella posizione completamente estesa, poi torna lentamente alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Kablo makinesini alçak konuma ayarlayın ve kolları takın.","Sırtınız yastığa dayalı ve ayaklarınız yere düz basacak şekilde eğimli bir bankta oturun.","Tutma yerlerini üstten kavrayın ve kollarınızı düz bir şekilde önünüze doğru uzatın.","Dirseklerinizi hafif bükerek kollarınızı kontrollü bir hareketle yanlara doğru açın.","Tamamen uzatılmış pozisyonda bir an duraklayın, ardından yavaşça başlangıç ​​pozisyonuna dönün.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta la máquina de cable a una posición baja y sujeta las agarraderas.","Siéntate en un banco inclinado con la espalda apoyada en el respaldo y los pies planos en el suelo.","Sujeta las agarraderas con un agarre prono y extiende los brazos rectos frente a ti.","Manteniendo una ligera flexión en los codos, abre los brazos hacia los lados con un movimiento controlado.","Haz una pausa breve en la posición completamente extendida, luego vuelve lentamente a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"deltoids","secondary_muscles":["deltoids","triceps"],"target":"pectorals","image":"images/0171-tBWXbIT.jpg","gif_url":"videos/0171-tBWXbIT.gif","created_at":"2026-03-18T12:31:32.874601+00:00"},{"id":"0175","name":"cable kneeling crunch","category":"waist","body_part":"waist","equipment":"cable","instructions":{"en":"Attach a rope handle to a high pulley and kneel down facing away from the machine. Hold the rope handle with both hands and place it behind your head, keeping your elbows out to the sides. Keeping your hips stationary, flex your waist and crunch your torso down towards your thighs. Pause for a moment at the bottom, then slowly return to the starting position. Repeat for the desired number of repetitions.","it":"Attacca una maniglia di corda a una carrucola alta e inginocchiati rivolto di spalle alla macchina. Tieni il manico della corda con entrambe le mani e posizionalo dietro la testa, tenendo i gomiti ai lati. Tieni i fianchi fermi, fletti la vita e schiaccia il busto verso le cosce. Fermati un attimo in fondo, poi torna lentamente alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Yüksek bir makaraya bir halat sapı takın ve makineden uzağa bakacak şekilde diz çökün. İpin sapını iki elinizle tutun ve dirseklerinizi yanlara doğru uzatarak başınızın arkasına yerleştirin. Kalçalarınızı sabit tutarak belinizi esnetin ve gövdenizi uyluklarınıza doğru indirin. Altta bir an duraklayın, ardından yavaşça başlangıç ​​pozisyonuna dönün. İstenilen sayıda tekrar için tekrarlayın.","es":"Sujeta una agarradera de cuerda a una polea alta y ponte de rodillas de espaldas a la máquina. Sujeta la agarradera de cuerda con ambas manos y colócala detrás de la cabeza, manteniendo los codos hacia afuera a los lados. Manteniendo las caderas inmóviles, flexiona la cintura y encoge el torso hacia los muslos. Haz una pausa por un momento en la parte inferior, luego regresa lentamente a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Attach a rope handle to a high pulley and kneel down facing away from the machine.","Hold the rope handle with both hands and place it behind your head, keeping your elbows out to the sides.","Keeping your hips stationary, flex your waist and crunch your torso down towards your thighs.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions."],"it":["Attacca una maniglia di corda a una carrucola alta e inginocchiati rivolto di spalle alla macchina.","Tieni il manico della corda con entrambe le mani e posizionalo dietro la testa, tenendo i gomiti ai lati.","Tieni i fianchi fermi, fletti la vita e schiaccia il busto verso le cosce.","Fermati un attimo in fondo, poi torna lentamente alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Yüksek bir makaraya bir halat sapı takın ve makineden uzağa bakacak şekilde diz çökün.","İpin sapını iki elinizle tutun ve dirseklerinizi yanlara doğru uzatarak başınızın arkasına yerleştirin.","Kalçalarınızı sabit tutarak belinizi esnetin ve gövdenizi uyluklarınıza doğru indirin.","Altta bir an duraklayın, ardından yavaşça başlangıç ​​pozisyonuna dönün.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Sujeta una agarradera de cuerda a una polea alta y ponte de rodillas de espaldas a la máquina.","Sujeta la agarradera de cuerda con ambas manos y colócala detrás de la cabeza, manteniendo los codos hacia afuera a los lados.","Manteniendo las caderas inmóviles, flexiona la cintura y encoge el torso hacia los muslos.","Haz una pausa por un momento en la parte inferior, luego regresa lentamente a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"obliques","secondary_muscles":["obliques"],"target":"abs","image":"images/0175-WW95auq.jpg","gif_url":"videos/0175-WW95auq.gif","created_at":"2026-03-18T12:31:32.874713+00:00"},{"id":"2330","name":"cable lat pulldown full range of motion","category":"back","body_part":"back","equipment":"cable","instructions":{"en":"Sit on the lat pulldown machine with your knees positioned under the pads. Grasp the cable bar with an overhand grip, slightly wider than shoulder-width apart. Lean back slightly and keep your chest up, maintaining a slight arch in your lower back. Pull the bar down towards your upper chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the bar back to the starting position. Repeat for the desired number of repetitions.","it":"Siediti sulla macchina per il lat pulldown con le ginocchia posizionate sotto le protezioni. Afferra la barra con una presa sopra la mano, leggermente più larga della larghezza delle spalle. Inclinati leggermente all\u0027indietro e tieni il petto sollevato, mantenendo un leggero arco nella parte bassa della schiena. Tira la barra verso il torace superiore, stringendo le scapole insieme. Fermati un attimo alla base del movimento, poi rilasci lentamente la barra alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Dizleriniz pedlerin altına gelecek şekilde lat pulldown makinesine oturun. Kablo çubuğunu omuz genişliğinden biraz daha geniş olacak şekilde üstten kavrayın. Hafifçe geriye yaslanın ve göğsünüzü yukarıda tutun, belinizin alt kısmında hafif bir kemer tutun. Omuz bıçaklarınızı birbirine sıkıştırarak çubuğu göğsünüzün üst kısmına doğru çekin. Hareketin alt noktasında bir süre duraklayın, ardından çubuğu yavaşça başlangıç ​​pozisyonuna bırakın. İstenilen sayıda tekrar için tekrarlayın.","es":"Siéntate en la máquina de jalón al pecho con las rodillas colocadas debajo de las almohadillas. Sujeta la barra del cable con un agarre prono, un poco más separado que el ancho de los hombros. Inclínate ligeramente hacia atrás y mantén el pecho elevado, conservando un ligero arco en la zona lumbar. Jala la barra hacia la parte superior del pecho, apretando los omóplatos entre sí. Haz una pausa por un momento en la parte baja del movimiento y luego suelta lentamente la barra de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Sit on the lat pulldown machine with your knees positioned under the pads.","Grasp the cable bar with an overhand grip, slightly wider than shoulder-width apart.","Lean back slightly and keep your chest up, maintaining a slight arch in your lower back.","Pull the bar down towards your upper chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the bar back to the starting position.","Repeat for the desired number of repetitions."],"it":["Siediti sulla macchina per il lat pulldown con le ginocchia posizionate sotto le protezioni.","Afferra la barra con una presa sopra la mano, leggermente più larga della larghezza delle spalle.","Inclinati leggermente all\u0027indietro e tieni il petto sollevato, mantenendo un leggero arco nella parte bassa della schiena.","Tira la barra verso il torace superiore, stringendo le scapole insieme.","Fermati un attimo alla base del movimento, poi rilasci lentamente la barra alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Dizleriniz pedlerin altına gelecek şekilde lat pulldown makinesine oturun.","Kablo çubuğunu omuz genişliğinden biraz daha geniş olacak şekilde üstten kavrayın.","Hafifçe geriye yaslanın ve göğsünüzü yukarıda tutun, belinizin alt kısmında hafif bir kemer tutun.","Omuz bıçaklarınızı birbirine sıkıştırarak çubuğu göğsünüzün üst kısmına doğru çekin.","Hareketin alt noktasında bir süre duraklayın, ardından çubuğu yavaşça başlangıç ​​pozisyonuna bırakın.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Siéntate en la máquina de jalón al pecho con las rodillas colocadas debajo de las almohadillas.","Sujeta la barra del cable con un agarre prono, un poco más separado que el ancho de los hombros.","Inclínate ligeramente hacia atrás y mantén el pecho elevado, conservando un ligero arco en la zona lumbar.","Jala la barra hacia la parte superior del pecho, apretando los omóplatos entre sí.","Haz una pausa por un momento en la parte baja del movimiento y luego suelta lentamente la barra de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"biceps","secondary_muscles":["biceps","rhomboids","rear deltoids"],"target":"lats","image":"images/2330-LEprlgG.jpg","gif_url":"videos/2330-LEprlgG.gif","created_at":"2026-03-18T12:31:32.874773+00:00"},{"id":"0179","name":"cable low fly","category":"chest","body_part":"chest","equipment":"cable","instructions":{"en":"Attach the handles to the low pulleys of a cable machine and select an appropriate weight. Stand in the middle of the machine with your feet shoulder-width apart and a slight bend in your knees. Grasp the handles with an overhand grip and extend your arms out to the sides, keeping a slight bend in your elbows. Maintaining control, slowly bring your arms forward in a sweeping motion, crossing them in front of your body. Pause for a moment at the peak of the movement, feeling the stretch in your chest muscles. Reverse the motion and slowly return your arms to the starting position, keeping tension on your chest muscles throughout. Repeat for the desired number of repetitions.","it":"Attacca le manici alle carrucole basse di una macchina a cavo e scegli un peso appropriato. Stai al centro della macchina con i piedi larghi alle spalle e con una leggera piega delle ginocchia. Afferra le maniglie con una presa sopra la mano e estendi le braccia ai lati, mantenendo una leggera piega dei gomiti. Mantenendo il controllo, porta lentamente le braccia in avanti in un movimento ampio, incrociandole davanti al corpo. Fermati un attimo al culmine del movimento, sentendo l\u0027allungamento nei muscoli del petto. Inverti il movimento e riporta lentamente le braccia alla posizione iniziale, mantenendo la tensione sui muscoli del petto per tutto il tempo. Ripeti per il numero desiderato di ripetizioni.","tr":"Tutamaçları kablo makinesinin alçak makaralarına takın ve uygun bir ağırlık seçin. Ayaklarınız omuz genişliğinde açık ve dizleriniz hafif bükülü olacak şekilde makinenin ortasında durun. Tutma yerlerini üstten kavrayın ve dirseklerinizi hafif bükerek kollarınızı yanlara doğru uzatın. Kontrolü koruyarak, kollarınızı geniş bir hareketle yavaşça öne doğru getirin ve onları vücudunuzun önünde çaprazlayın. Hareketin zirvesinde bir an duraklayın ve göğüs kaslarınızın gerginliğini hissedin. Hareketi tersine çevirin ve kollarınızı yavaşça başlangıç ​​pozisyonuna getirin, göğüs kaslarınızın gerginliğini koruyun. İstenilen sayıda tekrar için tekrarlayın.","es":"Sujeta las agarraderas a las poleas bajas de una máquina de cable y selecciona un peso adecuado. Ponte de pie en el centro de la máquina con los pies separados a la altura de los hombros y una ligera flexión en las rodillas. Sujeta las agarraderas con un agarre prono y extiende los brazos hacia los lados, manteniendo una ligera flexión en los codos. Manteniendo el control, lleva lentamente los brazos hacia adelante con un movimiento amplio, cruzándolos frente al cuerpo. Haz una pausa por un momento en el punto más alto del movimiento, sintiendo el estiramiento en los músculos del pecho. Invierte el movimiento y regresa lentamente los brazos a la posición inicial, manteniendo la tensión en los músculos del pecho durante todo el recorrido. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Attach the handles to the low pulleys of a cable machine and select an appropriate weight.","Stand in the middle of the machine with your feet shoulder-width apart and a slight bend in your knees.","Grasp the handles with an overhand grip and extend your arms out to the sides, keeping a slight bend in your elbows.","Maintaining control, slowly bring your arms forward in a sweeping motion, crossing them in front of your body.","Pause for a moment at the peak of the movement, feeling the stretch in your chest muscles.","Reverse the motion and slowly return your arms to the starting position, keeping tension on your chest muscles throughout.","Repeat for the desired number of repetitions."],"it":["Attacca le manici alle carrucole basse di una macchina a cavo e scegli un peso appropriato.","Stai al centro della macchina con i piedi larghi alle spalle e con una leggera piega delle ginocchia.","Afferra le maniglie con una presa sopra la mano e estendi le braccia ai lati, mantenendo una leggera piega dei gomiti.","Mantenendo il controllo, porta lentamente le braccia in avanti in un movimento ampio, incrociandole davanti al corpo.","Fermati un attimo al culmine del movimento, sentendo l\u0027allungamento nei muscoli del petto.","Inverti il movimento e riporta lentamente le braccia alla posizione iniziale, mantenendo la tensione sui muscoli del petto per tutto il tempo.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Tutamaçları kablo makinesinin alçak makaralarına takın ve uygun bir ağırlık seçin.","Ayaklarınız omuz genişliğinde açık ve dizleriniz hafif bükülü olacak şekilde makinenin ortasında durun.","Tutma yerlerini üstten kavrayın ve dirseklerinizi hafif bükerek kollarınızı yanlara doğru uzatın.","Kontrolü koruyarak, kollarınızı geniş bir hareketle yavaşça öne doğru getirin ve onları vücudunuzun önünde çaprazlayın.","Hareketin zirvesinde bir an duraklayın ve göğüs kaslarınızın gerginliğini hissedin.","Hareketi tersine çevirin ve kollarınızı yavaşça başlangıç ​​pozisyonuna getirin, göğüs kaslarınızın gerginliğini koruyun.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Sujeta las agarraderas a las poleas bajas de una máquina de cable y selecciona un peso adecuado.","Ponte de pie en el centro de la máquina con los pies separados a la altura de los hombros y una ligera flexión en las rodillas.","Sujeta las agarraderas con un agarre prono y extiende los brazos hacia los lados, manteniendo una ligera flexión en los codos.","Manteniendo el control, lleva lentamente los brazos hacia adelante con un movimiento amplio, cruzándolos frente al cuerpo.","Haz una pausa por un momento en el punto más alto del movimiento, sintiendo el estiramiento en los músculos del pecho.","Invierte el movimiento y regresa lentamente los brazos a la posición inicial, manteniendo la tensión en los músculos del pecho durante todo el recorrido.","Repite el número de repeticiones deseado."]},"muscle_group":"deltoids","secondary_muscles":["deltoids","triceps"],"target":"pectorals","image":"images/0179-FVmZVhk.jpg","gif_url":"videos/0179-FVmZVhk.gif","created_at":"2026-03-18T12:31:32.874842+00:00"},{"id":"0194","name":"cable overhead triceps extension (rope attachment)","category":"upper arms","body_part":"upper arms","equipment":"cable","instructions":{"en":"Attach a rope to a cable machine at a high position. Stand facing away from the machine with your feet shoulder-width apart. Grasp the rope with both hands, palms facing each other, and bring your hands above your head. Keep your upper arms close to your head and your elbows pointing forward. Slowly lower the rope behind your head by bending your elbows. Pause for a moment, then extend your arms back up to the starting position. Repeat for the desired number of repetitions.","it":"Attacca una corda a una macchina per cavi in una posizione alta. Mettiti di spalle alla macchina con i piedi a larghezza delle spalle. Afferra la corda con entrambe le mani, palmi rivolti l\u0027uno verso l\u0027altro, e porta le mani sopra la testa. Tieni le braccia superiori vicine alla testa e i gomiti rivolti in avanti. Abbassa lentamente la corda dietro la testa piegando i gomiti. Fermati un attimo, poi rialza le braccia fino alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Yüksek konumdaki bir kablo makinesine bir halat bağlayın. Ayaklarınız omuz genişliğinde açık olacak şekilde, yüzünüz makineden uzakta durun. Halatı iki elinizle tutun, avuçlarınız birbirine bakacak şekilde ve ellerinizi başınızın üzerine getirin. Üst kollarınızı başınıza yakın ve dirsekleriniz ileriyi gösterecek şekilde tutun. Dirseklerinizi bükerek ipi yavaşça başınızın arkasına indirin. Bir an duraklayın, ardından kollarınızı başlangıç ​​pozisyonuna kadar uzatın. İstenilen sayıda tekrar için tekrarlayın.","es":"Sujeta una cuerda a una máquina de cable en una posición alta. Ponte de pie de espaldas a la máquina con los pies separados a la altura de los hombros. Sujeta la cuerda con ambas manos, con las palmas una frente a la otra, y lleva las manos por encima de la cabeza. Mantén la parte superior de los brazos cerca de la cabeza y los codos apuntando hacia adelante. Baja lentamente la cuerda detrás de la cabeza flexionando los codos. Haz una pausa breve y luego extiende los brazos de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Attach a rope to a cable machine at a high position.","Stand facing away from the machine with your feet shoulder-width apart.","Grasp the rope with both hands, palms facing each other, and bring your hands above your head.","Keep your upper arms close to your head and your elbows pointing forward.","Slowly lower the rope behind your head by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."],"it":["Attacca una corda a una macchina per cavi in una posizione alta.","Mettiti di spalle alla macchina con i piedi a larghezza delle spalle.","Afferra la corda con entrambe le mani, palmi rivolti l\u0027uno verso l\u0027altro, e porta le mani sopra la testa.","Tieni le braccia superiori vicine alla testa e i gomiti rivolti in avanti.","Abbassa lentamente la corda dietro la testa piegando i gomiti.","Fermati un attimo, poi rialza le braccia fino alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Yüksek konumdaki bir kablo makinesine bir halat bağlayın.","Ayaklarınız omuz genişliğinde açık olacak şekilde, yüzünüz makineden uzakta durun.","Halatı iki elinizle tutun, avuçlarınız birbirine bakacak şekilde ve ellerinizi başınızın üzerine getirin.","Üst kollarınızı başınıza yakın ve dirsekleriniz ileriyi gösterecek şekilde tutun.","Dirseklerinizi bükerek ipi yavaşça başınızın arkasına indirin.","Bir an duraklayın, ardından kollarınızı başlangıç ​​pozisyonuna kadar uzatın.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Sujeta una cuerda a una máquina de cable en una posición alta.","Ponte de pie de espaldas a la máquina con los pies separados a la altura de los hombros.","Sujeta la cuerda con ambas manos, con las palmas una frente a la otra, y lleva las manos por encima de la cabeza.","Mantén la parte superior de los brazos cerca de la cabeza y los codos apuntando hacia adelante.","Baja lentamente la cuerda detrás de la cabeza flexionando los codos.","Haz una pausa breve y luego extiende los brazos de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"shoulders","secondary_muscles":["shoulders"],"target":"triceps","image":"images/0194-2IxROQ1.jpg","gif_url":"videos/0194-2IxROQ1.gif","created_at":"2026-03-18T12:31:32.875301+00:00"},{"id":"0203","name":"cable rear delt row (with rope)","category":"shoulders","body_part":"shoulders","equipment":"cable","instructions":{"en":"Attach a rope handle to a low pulley cable machine. Stand facing the machine with your feet shoulder-width apart. Grasp the rope handle with an overhand grip, palms facing each other. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Keep your elbows slightly bent and pull the rope towards your chest, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions.","it":"Attacca una maniglia di corda a una macchina a cavo a carrucole bassa. Stai rivolto verso la macchina con i piedi alla larghezza delle spalle. Afferra il manico della corda con una presa sopra la mano, palmi rivolti uno verso l\u0027altro. Piega leggermente le ginocchia e piega in avanti ai fianchi, mantenendo la schiena dritta. Tieni i gomiti leggermente piegati e tira la corda verso il petto, stringendo le scapole insieme. Fermati un attimo all\u0027inizio del movimento, poi rilassa lentamente la tensione e torna alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Alçak makaralı bir kablo makinesine bir halat sapı takın. Ayaklarınız omuz genişliğinde açık olacak şekilde makineye dönük durun. Halat sapını avuç içleriniz birbirine bakacak şekilde üstten kavrayın. Dizlerinizi hafifçe bükün ve sırtınızı düz tutarak kalçalarınızdan öne doğru eğilin. Dirseklerinizi hafifçe bükülü tutun ve kürek kemiklerinizi birbirine sıkıştırarak ipi göğsünüze doğru çekin. Hareketin en üst noktasında bir süre duraklayın, ardından yavaş yavaş gerilimi bırakın ve başlangıç ​​pozisyonuna dönün. İstenilen sayıda tekrar için tekrarlayın.","es":"Sujeta una agarradera de cuerda a una máquina de cable con polea baja. Ponte de pie frente a la máquina con los pies separados a la altura de los hombros. Sujeta la agarradera de cuerda con un agarre prono, con las palmas una frente a la otra. Flexiona ligeramente las rodillas e inclínate hacia adelante desde las caderas, manteniendo la espalda recta. Mantén los codos ligeramente flexionados y jala la cuerda hacia el pecho, apretando los omóplatos entre sí. Haz una pausa por un momento en la parte más alta del movimiento y luego libera lentamente la tensión, regresando a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Attach a rope handle to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope handle with an overhand grip, palms facing each other.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Keep your elbows slightly bent and pull the rope towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."],"it":["Attacca una maniglia di corda a una macchina a cavo a carrucole bassa.","Stai rivolto verso la macchina con i piedi alla larghezza delle spalle.","Afferra il manico della corda con una presa sopra la mano, palmi rivolti uno verso l\u0027altro.","Piega leggermente le ginocchia e piega in avanti ai fianchi, mantenendo la schiena dritta.","Tieni i gomiti leggermente piegati e tira la corda verso il petto, stringendo le scapole insieme.","Fermati un attimo all\u0027inizio del movimento, poi rilassa lentamente la tensione e torna alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Alçak makaralı bir kablo makinesine bir halat sapı takın.","Ayaklarınız omuz genişliğinde açık olacak şekilde makineye dönük durun.","Halat sapını avuç içleriniz birbirine bakacak şekilde üstten kavrayın.","Dizlerinizi hafifçe bükün ve sırtınızı düz tutarak kalçalarınızdan öne doğru eğilin.","Dirseklerinizi hafifçe bükülü tutun ve kürek kemiklerinizi birbirine sıkıştırarak ipi göğsünüze doğru çekin.","Hareketin en üst noktasında bir süre duraklayın, ardından yavaş yavaş gerilimi bırakın ve başlangıç ​​pozisyonuna dönün.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Sujeta una agarradera de cuerda a una máquina de cable con polea baja.","Ponte de pie frente a la máquina con los pies separados a la altura de los hombros.","Sujeta la agarradera de cuerda con un agarre prono, con las palmas una frente a la otra.","Flexiona ligeramente las rodillas e inclínate hacia adelante desde las caderas, manteniendo la espalda recta.","Mantén los codos ligeramente flexionados y jala la cuerda hacia el pecho, apretando los omóplatos entre sí.","Haz una pausa por un momento en la parte más alta del movimiento y luego libera lentamente la tensión, regresando a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"trapezius","secondary_muscles":["trapezius","rhomboids","biceps"],"target":"delts","image":"images/0203-wqNPGCg.jpg","gif_url":"videos/0203-wqNPGCg.gif","created_at":"2026-03-18T12:31:32.875502+00:00"},{"id":"0241","name":"cable triceps pushdown (v-bar)","category":"upper arms","body_part":"upper arms","equipment":"cable","instructions":{"en":"Attach a v-bar attachment to the cable machine at the highest setting. Stand facing the cable machine with your feet shoulder-width apart. Grasp the v-bar with an overhand grip, palms facing down, and your hands shoulder-width apart. Keep your elbows close to your sides and your upper arms stationary throughout the exercise. Engage your triceps and exhale as you push the v-bar down until your arms are fully extended. Pause for a moment at the bottom of the movement, squeezing your triceps. Inhale as you slowly return the v-bar to the starting position, maintaining control. Repeat for the desired number of repetitions.","it":"Collega un attacco a V-bar alla macchina a cavo al massimo dei punti. Stai di fronte alla macchina per cavi con i piedi a larghezza delle spalle. Afferra la V-bar con una presa sopra la mano, i palmi rivolti verso il basso e le mani alla larghezza delle spalle. Tieni i gomiti vicini ai fianchi e le braccia superiori ferme durante l\u0027esercizio. Attiva i tricipiti ed espira mentre spingi la V-bar verso il basso finché le braccia non sono completamente estese. Fermati un attimo alla base del movimento, stringendo i tricipiti. Inspira mentre riporti lentamente la V-bar alla posizione di partenza, mantenendo il controllo. Ripeti per il numero desiderato di ripetizioni.","tr":"Kablo makinesine en yüksek ayarda bir v-bar eklentisi takın. Ayaklarınız omuz genişliğinde açık olacak şekilde kablo makinesine dönük durun. V-bar\u0027ı üstten kavrayarak, avuçlarınız aşağıya bakacak şekilde ve elleriniz omuz genişliğinde açık olacak şekilde kavrayın. Egzersiz boyunca dirseklerinizi yanlarınıza yakın ve üst kollarınızı sabit tutun. Trisepslerinizi devreye sokun ve kollarınız tamamen uzayıncaya kadar V-bar\u0027ı aşağı doğru iterken nefes verin. Hareketin alt noktasında bir an duraklayın ve tricepslerinizi sıkın. Kontrolü koruyarak V-bar\u0027ı yavaşça başlangıç ​​pozisyonuna döndürürken nefes alın. İstenilen sayıda tekrar için tekrarlayın.","es":"Coloca un accesorio en V en la máquina de cable en el ajuste más alto. Ponte de pie frente a la máquina de cable con los pies separados a la altura de los hombros. Agarra el accesorio en V con un agarre prono, con las palmas hacia abajo y las manos separadas a la altura de los hombros. Mantén los codos cerca de los costados y los brazos superiores quietos durante todo el ejercicio. Activa los tríceps y exhala mientras empujas el accesorio en V hacia abajo hasta que los brazos estén completamente extendidos. Haz una pausa breve en la parte baja del movimiento, apretando los tríceps. Inhala mientras regresas lentamente el accesorio en V a la posición inicial, manteniendo el control. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Attach a v-bar attachment to the cable machine at the highest setting.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the v-bar with an overhand grip, palms facing down, and your hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Engage your triceps and exhale as you push the v-bar down until your arms are fully extended.","Pause for a moment at the bottom of the movement, squeezing your triceps.","Inhale as you slowly return the v-bar to the starting position, maintaining control.","Repeat for the desired number of repetitions."],"it":["Collega un attacco a V-bar alla macchina a cavo al massimo dei punti.","Stai di fronte alla macchina per cavi con i piedi a larghezza delle spalle.","Afferra la V-bar con una presa sopra la mano, i palmi rivolti verso il basso e le mani alla larghezza delle spalle.","Tieni i gomiti vicini ai fianchi e le braccia superiori ferme durante l\u0027esercizio.","Attiva i tricipiti ed espira mentre spingi la V-bar verso il basso finché le braccia non sono completamente estese.","Fermati un attimo alla base del movimento, stringendo i tricipiti.","Inspira mentre riporti lentamente la V-bar alla posizione di partenza, mantenendo il controllo.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Kablo makinesine en yüksek ayarda bir v-bar eklentisi takın.","Ayaklarınız omuz genişliğinde açık olacak şekilde kablo makinesine dönük durun.","V-bar\u0027ı üstten kavrayarak, avuçlarınız aşağıya bakacak şekilde ve elleriniz omuz genişliğinde açık olacak şekilde kavrayın.","Egzersiz boyunca dirseklerinizi yanlarınıza yakın ve üst kollarınızı sabit tutun.","Trisepslerinizi devreye sokun ve kollarınız tamamen uzayıncaya kadar V-bar\u0027ı aşağı doğru iterken nefes verin.","Hareketin alt noktasında bir an duraklayın ve tricepslerinizi sıkın.","Kontrolü koruyarak V-bar\u0027ı yavaşça başlangıç ​​pozisyonuna döndürürken nefes alın.","İstenilen sayıda tekrar için tek
