rarlayın."],"es":["Coloca un accesorio en V en la máquina de cable en el ajuste más alto.","Ponte de pie frente a la máquina de cable con los pies separados a la altura de los hombros.","Agarra el accesorio en V con un agarre prono, con las palmas hacia abajo y las manos separadas a la altura de los hombros.","Mantén los codos cerca de los costados y los brazos superiores quietos durante todo el ejercicio.","Activa los tríceps y exhala mientras empujas el accesorio en V hacia abajo hasta que los brazos estén completamente extendidos.","Haz una pausa breve en la parte baja del movimiento, apretando los tríceps.","Inhala mientras regresas lentamente el accesorio en V a la posición inicial, manteniendo el control.","Repite el número de repeticiones deseado."]},"muscle_group":"forearms","secondary_muscles":["forearms"],"target":"triceps","image":"images/0241-gAwDzB3.jpg","gif_url":"videos/0241-gAwDzB3.gif","created_at":"2026-03-18T12:31:32.876584+00:00"},{"id":"0243","name":"cable twist","category":"waist","body_part":"waist","equipment":"cable","instructions":{"en":"Stand with your feet shoulder-width apart, facing the cable machine. Hold the cable handle with both hands in front of your chest, keeping your arms slightly bent. Engage your core and twist your torso to the right, pulling the cable across your body. Pause for a moment at the end of the movement, feeling the contraction in your abs and obliques. Slowly return to the starting position, resisting the cable\u0027s pull. Repeat the movement to the left side. Continue alternating sides for the desired number of repetitions.","it":"Stai con i piedi a larghezza delle spalle, rivolto verso la macchina per cavi. Tieni la maniglia del cavo con entrambe le mani davanti al petto, tenendo le braccia leggermente piegate. Attiva il core e ruota il busto verso destra, tirando il cavo attraverso il corpo. Fermati un attimo alla fine del movimento, sentendo la contrazione negli addominali e negli obliqui. Torna lentamente alla posizione iniziale, resistendo alla trazione del cavo. Ripeti il movimento verso sinistra. Continua ad alternare i lati per il numero desiderato di ripetizioni.","tr":"Ayaklarınız omuz genişliğinde açık olacak şekilde, kablo makinesine bakacak şekilde ayakta durun. Kablo tutamağını iki elinizle göğsünüzün önünde tutun, kollarınızı hafifçe bükün. Merkez bölgenizi devreye alın ve kabloyu vücudunuz boyunca çekerek gövdenizi sağa doğru çevirin. Hareketin sonunda bir anlığına durun, karın kaslarınızdaki ve oblik kaslarınızdaki kasılmayı hissedin. Kablonun çekilmesine direnerek yavaşça başlangıç ​​pozisyonuna dönün. Hareketi sol tarafa doğru tekrarlayın. İstenilen tekrar sayısı için alternatif taraflara devam edin.","es":"Ponte de pie con los pies separados a la altura de los hombros, frente a la máquina de cable. Sujeta el mango del cable con ambas manos frente al pecho, manteniendo los brazos ligeramente flexionados. Activa el core y gira el torso hacia la derecha, tirando del cable a través de tu cuerpo. Haz una pausa breve al final del movimiento, sintiendo la contracción en el abdomen y los oblicuos. Regresa lentamente a la posición inicial, resistiendo la tracción del cable. Repite el movimiento hacia el lado izquierdo. Continúa alternando lados durante el número de repeticiones deseado."},"instruction_steps":{"en":["Stand with your feet shoulder-width apart, facing the cable machine.","Hold the cable handle with both hands in front of your chest, keeping your arms slightly bent.","Engage your core and twist your torso to the right, pulling the cable across your body.","Pause for a moment at the end of the movement, feeling the contraction in your abs and obliques.","Slowly return to the starting position, resisting the cable\u0027s pull.","Repeat the movement to the left side.","Continue alternating sides for the desired number of repetitions."],"it":["Stai con i piedi a larghezza delle spalle, rivolto verso la macchina per cavi.","Tieni la maniglia del cavo con entrambe le mani davanti al petto, tenendo le braccia leggermente piegate.","Attiva il core e ruota il busto verso destra, tirando il cavo attraverso il corpo.","Fermati un attimo alla fine del movimento, sentendo la contrazione negli addominali e negli obliqui.","Torna lentamente alla posizione iniziale, resistendo alla trazione del cavo.","Ripeti il movimento verso sinistra.","Continua ad alternare i lati per il numero desiderato di ripetizioni."],"tr":["Ayaklarınız omuz genişliğinde açık olacak şekilde, kablo makinesine bakacak şekilde ayakta durun.","Kablo tutamağını iki elinizle göğsünüzün önünde tutun, kollarınızı hafifçe bükün.","Merkez bölgenizi devreye alın ve kabloyu vücudunuz boyunca çekerek gövdenizi sağa doğru çevirin.","Hareketin sonunda bir anlığına durun, karın kaslarınızdaki ve oblik kaslarınızdaki kasılmayı hissedin.","Kablonun çekilmesine direnerek yavaşça başlangıç ​​pozisyonuna dönün.","Hareketi sol tarafa doğru tekrarlayın.","İstenilen tekrar sayısı için alternatif taraflara devam edin."],"es":["Ponte de pie con los pies separados a la altura de los hombros, frente a la máquina de cable.","Sujeta el mango del cable con ambas manos frente al pecho, manteniendo los brazos ligeramente flexionados.","Activa el core y gira el torso hacia la derecha, tirando del cable a través de tu cuerpo.","Haz una pausa breve al final del movimiento, sintiendo la contracción en el abdomen y los oblicuos.","Regresa lentamente a la posición inicial, resistiendo la tracción del cable.","Repite el movimiento hacia el lado izquierdo.","Continúa alternando lados durante el número de repeticiones deseado."]},"muscle_group":"obliques","secondary_muscles":["obliques"],"target":"abs","image":"images/0243-aVs3BR3.jpg","gif_url":"videos/0243-aVs3BR3.gif","created_at":"2026-03-18T12:31:32.876632+00:00"},{"id":"0313","name":"dumbbell hammer curl","category":"upper arms","body_part":"upper arms","equipment":"dumbbell","instructions":{"en":"Stand up straight with a dumbbell in each hand, palms facing your torso. Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward. This will be your starting position. Now, keeping the upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Then, inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the recommended amount of repetitions.","it":"Stai dritto con un manubrio in ogni mano, i palmi rivolti verso il busto. Tieni i gomiti vicini al busto e ruota i palmi delle mani finché non sono rivolti in avanti. Questa sarà la tua posizione di partenza. Ora, mantenendo ferme le braccia superiori, espira e arriccia i pesi mentre contrahi i bicipiti. Continua ad alzare i pesi finché i bicipiti non sono completamente contratti e i manubri non sono all\u0027altezza delle spalle. Mantieni la posizione contratta per una breve pausa mentre stringi i bicipiti. Poi, inspira e inizia lentamente ad abbassare i manubri fino alla posizione iniziale. Ripeti per il numero consigliato di ripetizioni.","tr":"Her iki elinizde de birer dambıl olacak şekilde dik durun, avuçlarınız gövdenize bakacak şekilde. Dirseklerinizi gövdenize yakın tutun ve avuçlarınızı öne bakana kadar döndürün. Bu sizin başlangıç ​​pozisyonunuz olacaktır. Şimdi üst kolları sabit tutarak nefes verin ve bicepslerinizi kasarken ağırlıkları kıvırın. Bisepsleriniz tamamen kasılana ve dambıllar omuz hizasına gelene kadar ağırlıkları kaldırmaya devam edin. Bicepslerinizi sıkarken kasılmış pozisyonu kısa bir süre koruyun. Daha sonra nefes alın ve dambılları yavaşça başlangıç ​​pozisyonuna indirmeye başlayın. Önerilen tekrar sayısı kadar tekrarlayın.","es":"Ponte de pie con una mancuerna en cada mano, con las palmas mirando hacia el torso. Mantén los codos cerca del torso y gira las palmas de las manos hasta que queden mirando hacia adelante. Esta será tu posición inicial. Ahora, manteniendo los brazos superiores quietos, exhala y flexiona los brazos contrayendo los bíceps. Continúa levantando las pesas hasta que los bíceps estén completamente contraídos y las mancuernas estén a la altura de los hombros. Mantén la posición contraída durante una breve pausa mientras aprietas los bíceps. Luego, inhala y comienza a bajar lentamente las mancuernas de vuelta a la posición inicial. Repite el número de repeticiones recomendado."},"instruction_steps":{"en":["Stand up straight with a dumbbell in each hand, palms facing your torso.","Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward.","This will be your starting position.","Now, keeping the upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Then, inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the recommended amount of repetitions."],"it":["Stai dritto con un manubrio in ogni mano, i palmi rivolti verso il busto.","Tieni i gomiti vicini al busto e ruota i palmi delle mani finché non sono rivolti in avanti.","Questa sarà la tua posizione di partenza.","Ora, mantenendo ferme le braccia superiori, espira e arriccia i pesi mentre contrahi i bicipiti.","Continua ad alzare i pesi finché i bicipiti non sono completamente contratti e i manubri non sono all\u0027altezza delle spalle.","Mantieni la posizione contratta per una breve pausa mentre stringi i bicipiti.","Poi, inspira e inizia lentamente ad abbassare i manubri fino alla posizione iniziale.","Ripeti per il numero consigliato di ripetizioni."],"tr":["Her iki elinizde de birer dambıl olacak şekilde dik durun, avuçlarınız gövdenize bakacak şekilde.","Dirseklerinizi gövdenize yakın tutun ve avuçlarınızı öne bakana kadar döndürün.","Bu sizin başlangıç ​​pozisyonunuz olacaktır.","Şimdi üst kolları sabit tutarak nefes verin ve bicepslerinizi kasarken ağırlıkları kıvırın.","Bisepsleriniz tamamen kasılana ve dambıllar omuz hizasına gelene kadar ağırlıkları kaldırmaya devam edin.","Bicepslerinizi sıkarken kasılmış pozisyonu kısa bir süre koruyun.","Daha sonra nefes alın ve dambılları yavaşça başlangıç ​​pozisyonuna indirmeye başlayın.","Önerilen tekrar sayısı kadar tekrarlayın."],"es":["Ponte de pie con una mancuerna en cada mano, con las palmas mirando hacia el torso.","Mantén los codos cerca del torso y gira las palmas de las manos hasta que queden mirando hacia adelante.","Esta será tu posición inicial.","Ahora, manteniendo los brazos superiores quietos, exhala y flexiona los brazos contrayendo los bíceps.","Continúa levantando las pesas hasta que los bíceps estén completamente contraídos y las mancuernas estén a la altura de los hombros.","Mantén la posición contraída durante una breve pausa mientras aprietas los bíceps.","Luego, inhala y comienza a bajar lentamente las mancuernas de vuelta a la posición inicial.","Repite el número de repeticiones recomendado."]},"muscle_group":"forearms","secondary_muscles":["forearms"],"target":"biceps","image":"images/0313-slDvUAU.jpg","gif_url":"videos/0313-slDvUAU.gif","created_at":"2026-03-18T12:31:32.87844+00:00"},{"id":"0314","name":"dumbbell incline bench press","category":"chest","body_part":"chest","equipment":"dumbbell","instructions":{"en":"Set up an incline bench at a 45-degree angle. Sit on the bench with your feet flat on the ground and your back pressed firmly against the bench. Hold a dumbbell in each hand, palms facing forward, and lift them to shoulder height. Slowly lower the dumbbells to the sides of your chest, keeping your elbows at a 90-degree angle. Push the dumbbells back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions.","it":"Installa una panca inclinata con un angolo di 45 gradi. Siediti sulla panca con i piedi piatti a terra e la schiena premuta saldamente contro la panca. Tieni un manubrio in ogni mano, palmi rivolti in avanti, e sollevali all\u0027altezza delle spalle. Abbassa lentamente i manubri ai lati del petto, mantenendo i gomiti a 90 gradi. Spingi i manubri di nuovo alla posizione iniziale, estendendo completamente le braccia. Ripeti per il numero desiderato di ripetizioni.","tr":"45 derecelik bir açıyla eğimli bir tezgah kurun. Ayaklarınız yere düz basacak ve sırtınız bankta sıkıca bastırılacak şekilde bankta oturun. Her iki elinize de birer dambıl tutun, avuçlarınız öne bakacak şekilde, omuz hizanıza kadar kaldırın. Dirseklerinizi 90 derecelik bir açıda tutarak dambılları yavaşça göğsünüzün yanlarına doğru indirin. Kollarınızı tamamen uzatarak dambılları başlangıç ​​pozisyonuna doğru itin. İstenilen sayıda tekrar için tekrarlayın.","es":"Coloca un banco inclinado a un ángulo de 45 grados. Siéntate en el banco con los pies apoyados en el suelo y la espalda firmemente apoyada contra el banco. Sostén una mancuerna en cada mano, con las palmas hacia adelante, y levántalas hasta la altura de los hombros. Baja lentamente las mancuernas hacia los lados del pecho, manteniendo los codos en un ángulo de 90 grados. Empuja las mancuernas de nuevo hacia arriba hasta la posición inicial, extendiendo completamente los brazos. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Set up an incline bench at a 45-degree angle.","Sit on the bench with your feet flat on the ground and your back pressed firmly against the bench.","Hold a dumbbell in each hand, palms facing forward, and lift them to shoulder height.","Slowly lower the dumbbells to the sides of your chest, keeping your elbows at a 90-degree angle.","Push the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."],"it":["Installa una panca inclinata con un angolo di 45 gradi.","Siediti sulla panca con i piedi piatti a terra e la schiena premuta saldamente contro la panca.","Tieni un manubrio in ogni mano, palmi rivolti in avanti, e sollevali all\u0027altezza delle spalle.","Abbassa lentamente i manubri ai lati del petto, mantenendo i gomiti a 90 gradi.","Spingi i manubri di nuovo alla posizione iniziale, estendendo completamente le braccia.","Ripeti per il numero desiderato di ripetizioni."],"tr":["45 derecelik bir açıyla eğimli bir tezgah kurun.","Ayaklarınız yere düz basacak ve sırtınız bankta sıkıca bastırılacak şekilde bankta oturun.","Her iki elinize de birer dambıl tutun, avuçlarınız öne bakacak şekilde, omuz hizanıza kadar kaldırın.","Dirseklerinizi 90 derecelik bir açıda tutarak dambılları yavaşça göğsünüzün yanlarına doğru indirin.","Kollarınızı tamamen uzatarak dambılları başlangıç ​​pozisyonuna doğru itin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Coloca un banco inclinado a un ángulo de 45 grados.","Siéntate en el banco con los pies apoyados en el suelo y la espalda firmemente apoyada contra el banco.","Sostén una mancuerna en cada mano, con las palmas hacia adelante, y levántalas hasta la altura de los hombros.","Baja lentamente las mancuernas hacia los lados del pecho, manteniendo los codos en un ángulo de 90 grados.","Empuja las mancuernas de nuevo hacia arriba hasta la posición inicial, extendiendo completamente los brazos.","Repite el número de repeticiones deseado."]},"muscle_group":"shoulders","secondary_muscles":["shoulders","triceps"],"target":"pectorals","image":"images/0314-ns0SIbU.jpg","gif_url":"videos/0314-ns0SIbU.gif","created_at":"2026-03-18T12:31:32.878538+00:00"},{"id":"0318","name":"dumbbell incline curl","category":"upper arms","body_part":"upper arms","equipment":"dumbbell","instructions":{"en":"Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing forward. Rest your upper arms on the incline bench and let your elbows hang down, fully extending your arms. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions.","it":"Imposta una panca inclinata a 45 gradi e siediti sopra con un manubrio in ogni mano, palmi rivolti in avanti. Appoggia le braccia superiori sulla panca inclinata e lascia che i gomiti pendano verso il basso, estendendo completamente le braccia. Mantenendo ferme le braccia superiori, espira e arriccia i pesi mentre contrahi i bicipiti. Continua ad alzare i manubri finché i bicipiti non sono completamente contratti e i manubri non sono all\u0027altezza delle spalle. Mantieni la posizione contratta per una breve pausa mentre stringi i bicipiti. Inspira e inizia lentamente ad abbassare i manubri fino alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Eğimli bir bench’i 45 derecelik bir açıya ayarlayın ve her iki elinizde birer dambıl olacak şekilde, avuçlarınız öne bakacak şekilde üzerine oturun. Üst kollarınızı eğimli bankın üzerine koyun ve dirseklerinizin aşağı sarkmasına izin vererek kollarınızı tamamen uzatın. Üst kollarınızı sabit tutarak, bicepslerinizi kasarken ağırlıkları nefes verin ve kıvırın. Bisepsleriniz tamamen kasılana ve dambıllar omuz hizasına gelene kadar dambılları kaldırmaya devam edin. Bicepslerinizi sıkarken kasılmış pozisyonu kısa bir süre koruyun. Nefes alın ve dambılları yavaşça başlangıç ​​pozisyonuna indirmeye başlayın. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta un banco inclinado a un ángulo de 45 grados y siéntate en él con una mancuerna en cada mano, con las palmas hacia adelante. Apoya los brazos superiores en el banco inclinado y deja que los codos cuelguen hacia abajo, extendiendo completamente los brazos. Manteniendo los brazos superiores fijos, exhala y levanta el peso mientras contraes los bíceps. Continúa levantando las mancuernas hasta que los bíceps estén completamente contraídos y las mancuernas estén a la altura de los hombros. Mantén la posición contraída durante una breve pausa mientras aprietas los bíceps. Inhala y comienza a bajar lentamente las mancuernas de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing forward.","Rest your upper arms on the incline bench and let your elbows hang down, fully extending your arms.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."],"it":["Imposta una panca inclinata a 45 gradi e siediti sopra con un manubrio in ogni mano, palmi rivolti in avanti.","Appoggia le braccia superiori sulla panca inclinata e lascia che i gomiti pendano verso il basso, estendendo completamente le braccia.","Mantenendo ferme le braccia superiori, espira e arriccia i pesi mentre contrahi i bicipiti.","Continua ad alzare i manubri finché i bicipiti non sono completamente contratti e i manubri non sono all\u0027altezza delle spalle.","Mantieni la posizione contratta per una breve pausa mentre stringi i bicipiti.","Inspira e inizia lentamente ad abbassare i manubri fino alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Eğimli bir bench’i 45 derecelik bir açıya ayarlayın ve her iki elinizde birer dambıl olacak şekilde, avuçlarınız öne bakacak şekilde üzerine oturun.","Üst kollarınızı eğimli bankın üzerine koyun ve dirseklerinizin aşağı sarkmasına izin vererek kollarınızı tamamen uzatın.","Üst kollarınızı sabit tutarak, bicepslerinizi kasarken ağırlıkları nefes verin ve kıvırın.","Bisepsleriniz tamamen kasılana ve dambıllar omuz hizasına gelene kadar dambılları kaldırmaya devam edin.","Bicepslerinizi sıkarken kasılmış pozisyonu kısa bir süre koruyun.","Nefes alın ve dambılları yavaşça başlangıç ​​pozisyonuna indirmeye başlayın.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta un banco inclinado a un ángulo de 45 grados y siéntate en él con una mancuerna en cada mano, con las palmas hacia adelante.","Apoya los brazos superiores en el banco inclinado y deja que los codos cuelguen hacia abajo, extendiendo completamente los brazos.","Manteniendo los brazos superiores fijos, exhala y levanta el peso mientras contraes los bíceps.","Continúa levantando las mancuernas hasta que los bíceps estén completamente contraídos y las mancuernas estén a la altura de los hombros.","Mantén la posición contraída durante una breve pausa mientras aprietas los bíceps.","Inhala y comienza a bajar lentamente las mancuernas de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"forearms","secondary_muscles":["forearms"],"target":"biceps","image":"images/0318-ae9UoXQ.jpg","gif_url":"videos/0318-ae9UoXQ.gif","created_at":"2026-03-18T12:31:32.878589+00:00"},{"id":"0327","name":"dumbbell incline row","category":"back","body_part":"back","equipment":"dumbbell","instructions":{"en":"Set up an incline bench at a 45-degree angle. Grab a dumbbell in each hand and sit on the bench with your chest against the incline. Extend your arms fully, allowing the dumbbells to hang straight down from your shoulders. Pull the dumbbells up towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the dumbbells back to the starting position. Repeat for the desired number of repetitions.","it":"Installa una panca inclinata con un angolo di 45 gradi. Prendi un manubrio in ogni mano e siediti sulla panca con il petto appoggiato all\u0027inclinazione. Allunga completamente le braccia, lasciando che i manubri pendano dritti dalle spalle. Tira i manubri verso il petto, stringendo le scapole insieme. Fermati un attimo in cima, poi abbassa lentamente i manubri alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"45 derecelik bir açıyla eğimli bir tezgah kurun. Her elinize birer dambıl alın ve göğsünüz eğime dönük olacak şekilde bankta oturun. Kollarınızı tamamen uzatın, dambılların omuzlarınızdan aşağıya doğru sarkmasına izin verin. Dambılları göğsünüze doğru çekin, kürek kemiklerinizi birbirine doğru sıkıştırın. Tepe noktasında bir süre duraklayın, ardından dambılları yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Coloca un banco inclinado a un ángulo de 45 grados. Toma una mancuerna en cada mano y siéntate en el banco con el pecho apoyado contra la inclinación. Extiende completamente los brazos, dejando que las mancuernas cuelguen rectas hacia abajo desde los hombros. Tira de las mancuernas hacia arriba, hacia el pecho, apretando los omóplatos entre sí. Haz una pausa breve en la parte alta, luego baja lentamente las mancuernas de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Set up an incline bench at a 45-degree angle.","Grab a dumbbell in each hand and sit on the bench with your chest against the incline.","Extend your arms fully, allowing the dumbbells to hang straight down from your shoulders.","Pull the dumbbells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."],"it":["Installa una panca inclinata con un angolo di 45 gradi.","Prendi un manubrio in ogni mano e siediti sulla panca con il petto appoggiato all\u0027inclinazione.","Allunga completamente le braccia, lasciando che i manubri pendano dritti dalle spalle.","Tira i manubri verso il petto, stringendo le scapole insieme.","Fermati un attimo in cima, poi abbassa lentamente i manubri alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["45 derecelik bir açıyla eğimli bir tezgah kurun.","Her elinize birer dambıl alın ve göğsünüz eğime dönük olacak şekilde bankta oturun.","Kollarınızı tamamen uzatın, dambılların omuzlarınızdan aşağıya doğru sarkmasına izin verin.","Dambılları göğsünüze doğru çekin, kürek kemiklerinizi birbirine doğru sıkıştırın.","Tepe noktasında bir süre duraklayın, ardından dambılları yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Coloca un banco inclinado a un ángulo de 45 grados.","Toma una mancuerna en cada mano y siéntate en el banco con el pecho apoyado contra la inclinación.","Extiende completamente los brazos, dejando que las mancuernas cuelguen rectas hacia abajo desde los hombros.","Tira de las mancuernas hacia arriba, hacia el pecho, apretando los omóplatos entre sí.","Haz una pausa breve en la parte alta, luego baja lentamente las mancuernas de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"biceps","secondary_muscles":["biceps","shoulders"],"target":"upper back","image":"images/0327-7vG5o25.jpg","gif_url":"videos/0327-7vG5o25.gif","created_at":"2026-03-18T12:31:32.87892+00:00"},{"id":"0334","name":"dumbbell lateral raise","category":"shoulders","body_part":"shoulders","equipment":"dumbbell","instructions":{"en":"Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body. Keep your back straight and engage your core. Raise your arms out to the sides until they are parallel to the floor, keeping a slight bend in your elbows. Pause for a moment at the top, then slowly lower your arms back down to the starting position. Repeat for the desired number of repetitions.","it":"Stai in piedi con i piedi alla larghezza delle spalle e tieni un manubrio in ogni mano, palmi rivolti verso il corpo. Tieni la schiena dritta e attiva il core. Alza le braccia ai lati finché non sono parallele al pavimento, mantenendo una leggera piega dei gomiti. Fermati un attimo in cima, poi abbassa lentamente le braccia fino alla posizione iniziale. Ripeti per il numero desiderato di ripetizioni.","tr":"Ayaklarınızı omuz genişliğinde açın ve avuçlarınız vücudunuza bakacak şekilde her iki elinizde bir dambıl tutun. Sırtınızı düz tutun ve çekirdeğinizi meşgul edin. Kollarınızı yere paralel olana kadar yanlara doğru kaldırın, dirseklerinizi hafif bir şekilde bükün. Tepe noktasında bir an duraklayın, ardından kollarınızı yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ponte de pie con los pies separados a la altura de los hombros y sostén una mancuerna en cada mano, con las palmas hacia el cuerpo. Mantén la espalda recta y activa el core. Levanta los brazos hacia los lados hasta que queden paralelos al suelo, manteniendo una ligera flexión en los codos. Haz una pausa por un momento en la parte superior, luego baja lentamente los brazos de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body.","Keep your back straight and engage your core.","Raise your arms out to the sides until they are parallel to the floor, keeping a slight bend in your elbows.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."],"it":["Stai in piedi con i piedi alla larghezza delle spalle e tieni un manubrio in ogni mano, palmi rivolti verso il corpo.","Tieni la schiena dritta e attiva il core.","Alza le braccia ai lati finché non sono parallele al pavimento, mantenendo una leggera piega dei gomiti.","Fermati un attimo in cima, poi abbassa lentamente le braccia fino alla posizione iniziale.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Ayaklarınızı omuz genişliğinde açın ve avuçlarınız vücudunuza bakacak şekilde her iki elinizde bir dambıl tutun.","Sırtınızı düz tutun ve çekirdeğinizi meşgul edin.","Kollarınızı yere paralel olana kadar yanlara doğru kaldırın, dirseklerinizi hafif bir şekilde bükün.","Tepe noktasında bir an duraklayın, ardından kollarınızı yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ponte de pie con los pies separados a la altura de los hombros y sostén una mancuerna en cada mano, con las palmas hacia el cuerpo.","Mantén la espalda recta y activa el core.","Levanta los brazos hacia los lados hasta que queden paralelos al suelo, manteniendo una ligera flexión en los codos.","Haz una pausa por un momento en la parte superior, luego baja lentamente los brazos de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"traps","secondary_muscles":["traps"],"target":"delts","image":"images/0334-DsgkuIt.jpg","gif_url":"videos/0334-DsgkuIt.gif","created_at":"2026-03-18T12:31:32.879137+00:00"},{"id":"0405","name":"dumbbell seated shoulder press","category":"shoulders","body_part":"shoulders","equipment":"dumbbell","instructions":{"en":"Sit on a bench with a dumbbell in each hand, resting on your thighs. Raise the dumbbells to shoulder height, palms facing forward. Press the dumbbells upward until your arms are fully extended overhead. Pause for a moment at the top, then slowly lower the dumbbells back to shoulder height. Repeat for the desired number of repetitions.","it":"Siediti su una panchina con un manubrio in ogni mano, appoggiato sulle cosce. Alza i manubri all\u0027altezza delle spalle, palmi rivolti in avanti. Premi i manubri verso l\u0027alto finché le braccia non sono completamente estese sopra la testa. Fermati un attimo in cima, poi abbassa lentamente i manubri all\u0027altezza delle spalle. Ripeti per il numero desiderato di ripetizioni.","tr":"Her iki elinizde birer dambıl olacak şekilde bir bankta oturun ve kalçalarınıza yaslanın. Dambılları omuz hizasına kadar kaldırın, avuç içleriniz öne baksın. Kollarınız başınızın üzerine tamamen uzatılıncaya kadar dambılları yukarıya doğru bastırın. Tepe noktasında bir süre duraklayın, ardından dambılları yavaşça omuz yüksekliğine indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Siéntate en un banco con una mancuerna en cada mano, apoyadas en los muslos. Sube las mancuernas hasta la altura de los hombros, con las palmas hacia adelante. Presiona las mancuernas hacia arriba hasta que los brazos queden completamente extendidos por encima de la cabeza. Haz una pausa por un momento en la parte superior, luego baja lentamente las mancuernas de vuelta a la altura de los hombros. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Sit on a bench with a dumbbell in each hand, resting on your thighs.","Raise the dumbbells to shoulder height, palms facing forward.","Press the dumbbells upward until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the dumbbells back to shoulder height.","Repeat for the desired number of repetitions."],"it":["Siediti su una panchina con un manubrio in ogni mano, appoggiato sulle cosce.","Alza i manubri all\u0027altezza delle spalle, palmi rivolti in avanti.","Premi i manubri verso l\u0027alto finché le braccia non sono completamente estese sopra la testa.","Fermati un attimo in cima, poi abbassa lentamente i manubri all\u0027altezza delle spalle.","Ripeti per il numero desiderato di ripetizioni."],"tr":["Her iki elinizde birer dambıl olacak şekilde bir bankta oturun ve kalçalarınıza yaslanın.","Dambılları omuz hizasına kadar kaldırın, avuç içleriniz öne baksın.","Kollarınız başınızın üzerine tamamen uzatılıncaya kadar dambılları yukarıya doğru bastırın.","Tepe noktasında bir süre duraklayın, ardından dambılları yavaşça omuz yüksekliğine indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Siéntate en un banco con una mancuerna en cada mano, apoyadas en los muslos.","Sube las mancuernas hasta la altura de los hombros, con las palmas hacia adelante.","Presiona las mancuernas hacia arriba hasta que los brazos queden completamente extendidos por encima de la cabeza.","Haz una pausa por un momento en la parte superior, luego baja lentamente las mancuernas de vuelta a la altura de los hombros.","Repite el número de repeticiones deseado."]},"muscle_group":"triceps","secondary_muscles":["triceps","upper back"],"target":"delts","image":"images/0405-znQUdHY.jpg","gif_url":"videos/0405-znQUdHY.gif","created_at":"2026-03-18T12:31:32.881529+00:00"},{"id":"0472","name":"hanging leg raise","category":"waist","body_part":"waist","equipment":"body weight","instructions":{"en":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your legs up in front of you, keeping them straight. Continue lifting until your legs are parallel to the ground or as high as you can comfortably go. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions.","it":"Appendi a una barra per trazioni con le braccia completamente distese e i palmi rivolti lontano da te. Coinvolgi il tuo core e solleva le gambe davanti a te, mantenendole dritte. Continua a sollevare finché le gambe non sono parallele al suolo o il più in alto possibile. Fai una pausa per un momento in alto, quindi abbassa lentamente le gambe fino alla posizione di partenza. Ripetere per il numero di ripetizioni desiderato.","tr":"Kollarınız tamamen uzatılmış ve avuçlarınız sizden uzağa bakacak şekilde barfiks barına asın. Merkez bölgenizi devreye sokun ve bacaklarınızı düz tutarak önünüze kaldırın. Bacaklarınız yere paralel veya rahatça çıkabildiğiniz kadar yükseğe çıkana kadar kaldırmaya devam edin. Tepe noktasında bir an duraklayın, ardından bacaklarınızı yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Cuélgate de una barra de dominadas con los brazos completamente extendidos y las palmas mirando hacia afuera. Activa el core y levanta las piernas frente a ti, manteniéndolas rectas. Continúa levantando hasta que las piernas estén paralelas al suelo o tan alto como puedas llegar cómodamente. Haz una pausa por un momento en la parte superior, luego baja lentamente las piernas de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up in front of you, keeping them straight.","Continue lifting until your legs are parallel to the ground or as high as you can comfortably go.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."],"it":["Appendi a una barra per trazioni con le braccia completamente distese e i palmi rivolti lontano da te.","Coinvolgi il tuo core e solleva le gambe davanti a te, mantenendole dritte.","Continua a sollevare finché le gambe non sono parallele al suolo o il più in alto possibile.","Fai una pausa per un momento in alto, quindi abbassa lentamente le gambe fino alla posizione di partenza.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Kollarınız tamamen uzatılmış ve avuçlarınız sizden uzağa bakacak şekilde barfiks barına asın.","Merkez bölgenizi devreye sokun ve bacaklarınızı düz tutarak önünüze kaldırın.","Bacaklarınız yere paralel veya rahatça çıkabildiğiniz kadar yükseğe çıkana kadar kaldırmaya devam edin.","Tepe noktasında bir an duraklayın, ardından bacaklarınızı yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Cuélgate de una barra de dominadas con los brazos completamente extendidos y las palmas mirando hacia afuera.","Activa el core y levanta las piernas frente a ti, manteniéndolas rectas.","Continúa levantando hasta que las piernas estén paralelas al suelo o tan alto como puedas llegar cómodamente.","Haz una pausa por un momento en la parte superior, luego baja lentamente las piernas de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"hip flexors","secondary_muscles":["hip flexors"],"target":"abs","image":"images/0472-I3tsCnC.jpg","gif_url":"videos/0472-I3tsCnC.gif","created_at":"2026-03-18T12:31:32.884162+00:00"},{"id":"0573","name":"lever back extension","category":"back","body_part":"back","equipment":"leverage machine","instructions":{"en":"Adjust the machine to fit your body size and range of motion. Sit on the machine with your back against the pad and your feet secured. Place your hands on the handles or grip bars. Engage your core and slowly lean forward, allowing your back to round slightly. Pause for a moment at the bottom position, feeling a stretch in your lower back. Using your back muscles, slowly raise your torso back to the starting position. Repeat for the desired number of repetitions.","it":"Regola la macchina in base alle dimensioni del tuo corpo e alla gamma di movimento. Sedersi sulla macchina con la schiena contro il cuscino e i piedi fissati. Appoggiare le mani sulle maniglie o sulle maniglie. Coinvolgi il tuo core e piegati lentamente in avanti, permettendo alla schiena di arrotondarsi leggermente. Fermati per un momento nella posizione inferiore, sentendo un allungamento nella parte bassa della schiena. Usando i muscoli della schiena, solleva lentamente il busto nella posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Makineyi vücut ölçülerinize ve hareket aralığınıza uyacak şekilde ayarlayın. Sırtınız yastığa dayalı ve ayaklarınız sabitlenmiş şekilde makinenin üzerine oturun. Ellerinizi tutamakların veya tutma çubuklarının üzerine koyun. Merkez bölgenizi devreye sokun ve yavaşça öne doğru eğilin, sırtınızın hafifçe dönmesine izin verin. Alt pozisyonda bir an duraklayın, belinizin alt kısmında bir gerginlik hissedin. Sırt kaslarınızı kullanarak gövdenizi yavaşça başlangıç ​​pozisyonuna kaldırın. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta la máquina según el tamaño de tu cuerpo y tu rango de movimiento. Siéntate en la máquina con la espalda apoyada en la almohadilla y los pies asegurados. Coloca las manos en las asas o en las barras de agarre. Activa el core e inclínate lentamente hacia adelante, permitiendo que la espalda se redondee ligeramente. Haz una pausa breve en la posición baja, sintiendo un estiramiento en la zona lumbar. Usando los músculos de la espalda, levanta lentamente el torso de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the machine to fit your body size and range of motion.","Sit on the machine with your back against the pad and your feet secured.","Place your hands on the handles or grip bars.","Engage your core and slowly lean forward, allowing your back to round slightly.","Pause for a moment at the bottom position, feeling a stretch in your lower back.","Using your back muscles, slowly raise your torso back to the starting position.","Repeat for the desired number of repetitions."],"it":["Regola la macchina in base alle dimensioni del tuo corpo e alla gamma di movimento.","Sedersi sulla macchina con la schiena contro il cuscino e i piedi fissati.","Appoggiare le mani sulle maniglie o sulle maniglie.","Coinvolgi il tuo core e piegati lentamente in avanti, permettendo alla schiena di arrotondarsi leggermente.","Fermati per un momento nella posizione inferiore, sentendo un allungamento nella parte bassa della schiena.","Usando i muscoli della schiena, solleva lentamente il busto nella posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Makineyi vücut ölçülerinize ve hareket aralığınıza uyacak şekilde ayarlayın.","Sırtınız yastığa dayalı ve ayaklarınız sabitlenmiş şekilde makinenin üzerine oturun.","Ellerinizi tutamakların veya tutma çubuklarının üzerine koyun.","Merkez bölgenizi devreye sokun ve yavaşça öne doğru eğilin, sırtınızın hafifçe dönmesine izin verin.","Alt pozisyonda bir an duraklayın, belinizin alt kısmında bir gerginlik hissedin.","Sırt kaslarınızı kullanarak gövdenizi yavaşça başlangıç ​​pozisyonuna kaldırın.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta la máquina según el tamaño de tu cuerpo y tu rango de movimiento.","Siéntate en la máquina con la espalda apoyada en la almohadilla y los pies asegurados.","Coloca las manos en las asas o en las barras de agarre.","Activa el core e inclínate lentamente hacia adelante, permitiendo que la espalda se redondee ligeramente.","Haz una pausa breve en la posición baja, sintiendo un estiramiento en la zona lumbar.","Usando los músculos de la espalda, levanta lentamente el torso de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"glutes","secondary_muscles":["glutes","hamstrings"],"target":"spine","image":"images/0573-rUXfn3R.jpg","gif_url":"videos/0573-rUXfn3R.gif","created_at":"2026-03-18T12:31:32.886077+00:00"},{"id":"0585","name":"lever leg extension","category":"upper legs","body_part":"upper legs","equipment":"leverage machine","instructions":{"en":"Adjust the seat height and backrest of the machine to fit your body. Sit on the machine with your back against the backrest and your feet on the footpad. Grasp the handles or sidebars for stability. Extend your legs forward by straightening your knees, lifting the weight. Pause for a moment at the top, then slowly lower the weight back to the starting position. Repeat for the desired number of repetitions.","it":"Regola l\u0027altezza del sedile e lo schienale della macchina per adattarli al tuo corpo. Sedersi sulla macchina con la schiena appoggiata allo schienale e i piedi sul poggiapiedi. Afferrare le maniglie o le barre laterali per garantire stabilità. Estendi le gambe in avanti raddrizzando le ginocchia, sollevando il peso. Fermati per un momento in alto, quindi abbassa lentamente il peso nella posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Makinenin koltuk yüksekliğini ve sırtlığını vücudunuza göre ayarlayın. Sırtınız koltuk arkalığına dayalı ve ayaklarınız ayak tabanının üzerinde olacak şekilde makinenin üzerine oturun. Denge için tutamaçları veya kenar çubuklarını kavrayın. Ağırlığı kaldırarak dizlerinizi düzleştirerek bacaklarınızı öne doğru uzatın. Tepe noktasında bir süre duraklayın, ardından ağırlığı yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta la altura del asiento y el respaldo de la máquina a tu cuerpo. Siéntate en la máquina con la espalda apoyada en el respaldo y los pies sobre la almohadilla para los pies. Sujeta las asas o las barras laterales para mayor estabilidad. Extiende las piernas hacia adelante enderezando las rodillas, levantando el peso. Haz una pausa breve en lo alto, luego baja lentamente el peso de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the seat height and backrest of the machine to fit your body.","Sit on the machine with your back against the backrest and your feet on the footpad.","Grasp the handles or sidebars for stability.","Extend your legs forward by straightening your knees, lifting the weight.","Pause for a moment at the top, then slowly lower the weight back to the starting position.","Repeat for the desired number of repetitions."],"it":["Regola l\u0027altezza del sedile e lo schienale della macchina per adattarli al tuo corpo.","Sedersi sulla macchina con la schiena appoggiata allo schienale e i piedi sul poggiapiedi.","Afferrare le maniglie o le barre laterali per garantire stabilità.","Estendi le gambe in avanti raddrizzando le ginocchia, sollevando il peso.","Fermati per un momento in alto, quindi abbassa lentamente il peso nella posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Makinenin koltuk yüksekliğini ve sırtlığını vücudunuza göre ayarlayın.","Sırtınız koltuk arkalığına dayalı ve ayaklarınız ayak tabanının üzerinde olacak şekilde makinenin üzerine oturun.","Denge için tutamaçları veya kenar çubuklarını kavrayın.","Ağırlığı kaldırarak dizlerinizi düzleştirerek bacaklarınızı öne doğru uzatın.","Tepe noktasında bir süre duraklayın, ardından ağırlığı yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta la altura del asiento y el respaldo de la máquina a tu cuerpo.","Siéntate en la máquina con la espalda apoyada en el respaldo y los pies sobre la almohadilla para los pies.","Sujeta las asas o las barras laterales para mayor estabilidad.","Extiende las piernas hacia adelante enderezando las rodillas, levantando el peso.","Haz una pausa breve en lo alto, luego baja lentamente el peso de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"hamstrings","secondary_muscles":["hamstrings"],"target":"quads","image":"images/0585-my33uHU.jpg","gif_url":"videos/0585-my33uHU.gif","created_at":"2026-03-18T12:31:32.886517+00:00"},{"id":"0594","name":"lever seated calf raise","category":"lower legs","body_part":"lower legs","equipment":"leverage machine","instructions":{"en":"Adjust the seat height so that your knees are slightly bent and your feet are flat on the footplate. Place your toes on the footplate with your heels hanging off the edge. Grasp the handles or the sides of the seat for stability. Push through the balls of your feet to raise your heels as high as possible. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions.","it":"Regolare l\u0027altezza del sedile in modo che le ginocchia siano leggermente piegate e i piedi siano appoggiati sulla pedana. Posiziona le dita dei piedi sulla pedana con i talloni che pendono dal bordo. Afferrare le maniglie o i lati del sedile per stabilità. Spingi attraverso le punte dei piedi per sollevare i talloni il più in alto possibile. Fai una pausa per un momento in alto, quindi abbassa lentamente i talloni nella posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Koltuk yüksekliğini, dizleriniz hafifçe bükülü ve ayaklarınız taban plakası üzerinde düz olacak şekilde ayarlayın. Topuklarınız kenardan sarkacak şekilde ayak parmaklarınızı taban plakasının üzerine yerleştirin. Denge için koltuğun kollarını veya yanlarını tutun. Topuklarınızı mümkün olduğunca yükseğe kaldırmak için ayak parmak uçlarınızı itin. Tepe noktasında bir an duraklayın, ardından topuklarınızı yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta la altura del asiento de modo que las rodillas queden ligeramente flexionadas y los pies queden planos sobre la placa para los pies. Coloca los dedos de los pies sobre la placa para los pies, con los talones colgando fuera del borde. Sujeta las asas o los lados del asiento para mayor estabilidad. Empuja con la parte delantera de los pies para elevar los talones tan alto como sea posible. Haz una pausa breve en la parte alta y luego baja lentamente los talones de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the seat height so that your knees are slightly bent and your feet are flat on the footplate.","Place your toes on the footplate with your heels hanging off the edge.","Grasp the handles or the sides of the seat for stability.","Push through the balls of your feet to raise your heels as high as possible.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."],"it":["Regolare l\u0027altezza del sedile in modo che le ginocchia siano leggermente piegate e i piedi siano appoggiati sulla pedana.","Posiziona le dita dei piedi sulla pedana con i talloni che pendono dal bordo.","Afferrare le maniglie o i lati del sedile per stabilità.","Spingi attraverso le punte dei piedi per sollevare i talloni il più in alto possibile.","Fai una pausa per un momento in alto, quindi abbassa lentamente i talloni nella posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Koltuk yüksekliğini, dizleriniz hafifçe bükülü ve ayaklarınız taban plakası üzerinde düz olacak şekilde ayarlayın.","Topuklarınız kenardan sarkacak şekilde ayak parmaklarınızı taban plakasının üzerine yerleştirin.","Denge için koltuğun kollarını veya yanlarını tutun.","Topuklarınızı mümkün olduğunca yükseğe kaldırmak için ayak parmak uçlarınızı itin.","Tepe noktasında bir an duraklayın, ardından topuklarınızı yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta la altura del asiento de modo que las rodillas queden ligeramente flexionadas y los pies queden planos sobre la placa para los pies.","Coloca los dedos de los pies sobre la placa para los pies, con los talones colgando fuera del borde.","Sujeta las asas o los lados del asiento para mayor estabilidad.","Empuja con la parte delantera de los pies para elevar los talones tan alto como sea posible.","Haz una pausa breve en la parte alta y luego baja lentamente los talones de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"soleus","secondary_muscles":["soleus","ankle stabilizers"],"target":"calves","image":"images/0594-bOOdeyc.jpg","gif_url":"videos/0594-bOOdeyc.gif","created_at":"2026-03-18T12:31:32.886903+00:00"},{"id":"0599","name":"lever seated leg curl","category":"upper legs","body_part":"upper legs","equipment":"leverage machine","instructions":{"en":"Adjust the machine to fit your body and sit on it with your back against the backrest. Place your lower legs under the padded lever, just above your ankles. Grasp the handles on the sides of the machine for support. Keeping your upper legs stationary, exhale and curl your legs up as far as possible. Hold the contracted position for a brief pause as you squeeze your hamstrings. Inhale and slowly lower the lever back to the starting position. Repeat for the desired number of repetitions.","it":"Regola la macchina per adattarla al tuo corpo e siediti con la schiena contro lo schienale. Posiziona la parte inferiore delle gambe sotto la leva imbottita, appena sopra le caviglie. Afferrare le maniglie ai lati della macchina per sostenersi. Mantenendo ferma la parte superiore delle gambe, espira e piega le gambe il più possibile. Mantieni la posizione contratta per una breve pausa mentre contrai i muscoli posteriori della coscia. Inspira e abbassa lentamente la leva nella posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Makineyi vücudunuza uyacak şekilde ayarlayın ve sırtınızı koltuk arkalığına yaslayacak şekilde üzerine oturun. Alt bacaklarınızı ayak bileklerinizin hemen üzerindeki yastıklı kolun altına yerleştirin. Destek için makinenin yanlarındaki tutamaçlardan tutun. Üst bacaklarınızı sabit tutarak nefes verin ve bacaklarınızı mümkün olduğunca yukarı doğru kıvırın. Diz arkası kaslarınızı sıkarken kısa bir süre kasılmış pozisyonu koruyun. Nefes alın ve kolu yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta la máquina a tu cuerpo y siéntate en ella con la espalda apoyada en el respaldo. Coloca la parte baja de las piernas debajo de la palanca acolchada, justo por encima de los tobillos. Sujeta las asas a los lados de la máquina para mayor apoyo. Manteniendo la parte superior de las piernas inmóvil, exhala y flexiona las piernas hacia arriba todo lo que puedas. Mantén la posición contraída durante una pausa breve mientras aprietas los isquiotibiales. Inhala y baja lentamente la palanca de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the machine to fit your body and sit on it with your back against the backrest.","Place your lower legs under the padded lever, just above your ankles.","Grasp the handles on the sides of the machine for support.","Keeping your upper legs stationary, exhale and curl your legs up as far as possible.","Hold the contracted position for a brief pause as you squeeze your hamstrings.","Inhale and slowly lower the lever back to the starting position.","Repeat for the desired number of repetitions."],"it":["Regola la macchina per adattarla al tuo corpo e siediti con la schiena contro lo schienale.","Posiziona la parte inferiore delle gambe sotto la leva imbottita, appena sopra le caviglie.","Afferrare le maniglie ai lati della macchina per sostenersi.","Mantenendo ferma la parte superiore delle gambe, espira e piega le gambe il più possibile.","Mantieni la posizione contratta per una breve pausa mentre contrai i muscoli posteriori della coscia.","Inspira e abbassa lentamente la leva nella posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Makineyi vücudunuza uyacak şekilde ayarlayın ve sırtınızı koltuk arkalığına yaslayacak şekilde üzerine oturun.","Alt bacaklarınızı ayak bileklerinizin hemen üzerindeki yastıklı kolun altına yerleştirin.","Destek için makinenin yanlarındaki tutamaçlardan tutun.","Üst bacaklarınızı sabit tutarak nefes verin ve bacaklarınızı mümkün olduğunca yukarı doğru kıvırın.","Diz arkası kaslarınızı sıkarken kısa bir süre kasılmış pozisyonu koruyun.","Nefes alın ve kolu yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta la máquina a tu cuerpo y siéntate en ella con la espalda apoyada en el respaldo.","Coloca la parte baja de las piernas debajo de la palanca acolchada, justo por encima de los tobillos.","Sujeta las asas a los lados de la máquina para mayor apoyo.","Manteniendo la parte superior de las piernas inmóvil, exhala y flexiona las piernas hacia arriba todo lo que puedas.","Mantén la posición contraída durante una pausa breve mientras aprietas los isquiotibiales.","Inhala y baja lentamente la palanca de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"calves","secondary_muscles":["calves"],"target":"hamstrings","image":"images/0599-Zg3XY7P.jpg","gif_url":"videos/0599-Zg3XY7P.gif","created_at":"2026-03-18T12:31:32.887065+00:00"},{"id":"0605","name":"lever standing calf raise","category":"lower legs","body_part":"lower legs","equipment":"leverage machine","instructions":{"en":"Adjust the machine to your height and stand with your feet shoulder-width apart. Place your shoulders under the pads and hold onto the handles for stability. Raise your heels as high as possible by extending your ankles. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions.","it":"Regola la macchina alla tua altezza e stai con i piedi alla larghezza delle spalle. Posiziona le spalle sotto le imbottiture e tieni le maniglie per stabilità. Alza i talloni il più in alto possibile estendendo le caviglie. Fai una pausa per un momento in alto, quindi abbassa lentamente i talloni nella posizione iniziale. Ripetere per il numero di ripetizioni desiderato.","tr":"Makineyi boyunuza göre ayarlayın ve ayaklarınız omuz genişliğinde açık olacak şekilde ayakta durun. Omuzlarınızı yastıkların altına yerleştirin ve stabilite için tutma yerlerinden tutun. Ayak bileklerinizi uzatarak topuklarınızı mümkün olduğu kadar yükseğe kaldırın. Tepe noktasında bir an duraklayın, ardından topuklarınızı yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta la máquina a tu altura y ponte de pie con los pies separados a la altura de los hombros. Coloca los hombros debajo de las almohadillas y sujétate de las asas para mayor estabilidad. Eleva los talones tan alto como puedas extendiendo los tobillos. Haz una pausa breve en la parte alta y luego baja lentamente los talones de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the machine to your height and stand with your feet shoulder-width apart.","Place your shoulders under the pads and hold onto the handles for stability.","Raise your heels as high as possible by extending your ankles.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."],"it":["Regola la macchina alla tua altezza e stai con i piedi alla larghezza delle spalle.","Posiziona le spalle sotto le imbottiture e tieni le maniglie per stabilità.","Alza i talloni il più in alto possibile estendendo le caviglie.","Fai una pausa per un momento in alto, quindi abbassa lentamente i talloni nella posizione iniziale.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Makineyi boyunuza göre ayarlayın ve ayaklarınız omuz genişliğinde açık olacak şekilde ayakta durun.","Omuzlarınızı yastıkların altına yerleştirin ve stabilite için tutma yerlerinden tutun.","Ayak bileklerinizi uzatarak topuklarınızı mümkün olduğu kadar yükseğe kaldırın.","Tepe noktasında bir an duraklayın, ardından topuklarınızı yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta la máquina a tu altura y ponte de pie con los pies separados a la altura de los hombros.","Coloca los hombros debajo de las almohadillas y sujétate de las asas para mayor estabilidad.","Eleva los talones tan alto como puedas extendiendo los tobillos.","Haz una pausa breve en la parte alta y luego baja lentamente los talones de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"soleus","secondary_muscles":["soleus","ankle stabilizers"],"target":"calves","image":"images/0605-ykUOVze.jpg","gif_url":"videos/0605-ykUOVze.gif","created_at":"2026-03-18T12:31:32.887247+00:00"},{"id":"1460","name":"walking lunge","category":"upper legs","body_part":"upper legs","equipment":"body weight","instructions":{"en":"Stand with your feet shoulder-width apart. Take a step forward with your right leg, lowering your body into a lunge position. Keep your torso upright and your front knee aligned with your ankle. Push off with your right foot and bring your left foot forward, stepping into a lunge position with your left leg. Continue alternating legs and walking forward, maintaining a controlled and steady pace. Repeat for the desired number of repetitions.","it":"Stai con i piedi alla larghezza delle spalle. Fai un passo avanti con la gamba destra, abbassando il corpo in una posizione di affondo. Mantieni il busto in posizione verticale e il ginocchio anteriore allineato con la caviglia. Spingi con il piede destro e porta il piede sinistro in avanti, assumendo una posizione di affondo con la gamba sinistra. Continua ad alternare le gambe e a camminare in avanti, mantenendo un ritmo controllato e costante. Ripetere per il numero di ripetizioni desiderato.","tr":"Ayaklarınız omuz genişliğinde açık olacak şekilde ayakta durun. Sağ bacağınızla öne doğru bir adım atın, vücudunuzu hamle pozisyonuna indirin. Gövdenizi dik tutun ve ön dizinizi ayak bileğinizle aynı hizada tutun. Sağ ayağınızla itin ve sol ayağınızı öne doğru getirin, sol bacağınızla hamle pozisyonuna geçin. Kontrollü ve sabit bir tempoyu koruyarak bacaklarınızı değiştirerek ileri doğru yürümeye devam edin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ponte de pie con los pies separados a la altura de los hombros. Da un paso adelante con la pierna derecha, bajando el cuerpo a una posición de zancada. Mantén el torso erguido y la rodilla delantera alineada con el tobillo. Empújate con el pie derecho y lleva el pie izquierdo hacia adelante, entrando en una posición de zancada con la pierna izquierda. Continúa alternando las piernas y avanzando, manteniendo un ritmo controlado y constante. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Stand with your feet shoulder-width apart.","Take a step forward with your right leg, lowering your body into a lunge position.","Keep your torso upright and your front knee aligned with your ankle.","Push off with your right foot and bring your left foot forward, stepping into a lunge position with your left leg.","Continue alternating legs and walking forward, maintaining a controlled and steady pace.","Repeat for the desired number of repetitions."],"it":["Stai con i piedi alla larghezza delle spalle.","Fai un passo avanti con la gamba destra, abbassando il corpo in una posizione di affondo.","Mantieni il busto in posizione verticale e il ginocchio anteriore allineato con la caviglia.","Spingi con il piede destro e porta il piede sinistro in avanti, assumendo una posizione di affondo con la gamba sinistra.","Continua ad alternare le gambe e a camminare in avanti, mantenendo un ritmo controllato e costante.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Ayaklarınız omuz genişliğinde açık olacak şekilde ayakta durun.","Sağ bacağınızla öne doğru bir adım atın, vücudunuzu hamle pozisyonuna indirin.","Gövdenizi dik tutun ve ön dizinizi ayak bileğinizle aynı hizada tutun.","Sağ ayağınızla itin ve sol ayağınızı öne doğru getirin, sol bacağınızla hamle pozisyonuna geçin.","Kontrollü ve sabit bir tempoyu koruyarak bacaklarınızı değiştirerek ileri doğru yürümeye devam edin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ponte de pie con los pies separados a la altura de los hombros.","Da un paso adelante con la pierna derecha, bajando el cuerpo a una posición de zancada.","Mantén el torso erguido y la rodilla delantera alineada con el tobillo.","Empújate con el pie derecho y lleva el pie izquierdo hacia adelante, entrando en una posición de zancada con la pierna izquierda.","Continúa alternando las piernas y avanzando, manteniendo un ritmo controlado y constante.","Repite el número de repeticiones deseado."]},"muscle_group":"quadriceps","secondary_muscles":["quadriceps","hamstrings","calves"],"target":"glutes","image":"images/1460-IZVHb27.jpg","gif_url":"videos/1460-IZVHb27.gif","created_at":"2026-03-18T12:31:32.905661+00:00"},{"id":"0841","name":"weighted pull-up","category":"back","body_part":"back","equipment":"weighted","instructions":{"en":"Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your body straight. Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions.","it":"Afferra la barra per trazioni con una presa prona, leggermente più larga della larghezza delle spalle. Appendi alla barra con le braccia completamente distese e il corpo dritto. Coinvolgi i muscoli della schiena e solleva il corpo verso la barra, mantenendo i gomiti vicini al corpo. Continua a tirare finché il mento non è sopra la barra. Fai una pausa per un momento in alto, quindi abbassa lentamente il corpo fino alla posizione di partenza. Ripetere per il numero di ripetizioni desiderato.","tr":"Barfiks çubuğunu omuz genişliğinden biraz daha geniş olacak şekilde üstten kavrayarak kavrayın. Kollarınız tamamen uzatılmış ve vücudunuz düz olacak şekilde bara asın. Sırt kaslarınızı çalıştırın ve dirseklerinizi vücudunuza yakın tutarak vücudunuzu bara doğru yukarı çekin. Çeneniz çubuğun üstüne çıkana kadar çekmeye devam edin. Tepe noktasında bir an duraklayın, ardından vücudunuzu yavaşça başlangıç ​​pozisyonuna indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Sujeta la barra de dominadas con un agarre prono, un poco más ancho que la altura de los hombros. Cuélgate de la barra con los brazos completamente extendidos y el cuerpo recto. Activa los músculos de la espalda y tira de tu cuerpo hacia arriba, hacia la barra, manteniendo los codos cerca del cuerpo. Continúa subiendo hasta que la barbilla quede por encima de la barra. Haz una pausa por un momento en la parte superior, luego baja lentamente el cuerpo de vuelta a la posición inicial. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."],"it":["Afferra la barra per trazioni con una presa prona, leggermente più larga della larghezza delle spalle.","Appendi alla barra con le braccia completamente distese e il corpo dritto.","Coinvolgi i muscoli della schiena e solleva il corpo verso la barra, mantenendo i gomiti vicini al corpo.","Continua a tirare finché il mento non è sopra la barra.","Fai una pausa per un momento in alto, quindi abbassa lentamente il corpo fino alla posizione di partenza.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Barfiks çubuğunu omuz genişliğinden biraz daha geniş olacak şekilde üstten kavrayarak kavrayın.","Kollarınız tamamen uzatılmış ve vücudunuz düz olacak şekilde bara asın.","Sırt kaslarınızı çalıştırın ve dirseklerinizi vücudunuza yakın tutarak vücudunuzu bara doğru yukarı çekin.","Çeneniz çubuğun üstüne çıkana kadar çekmeye devam edin.","Tepe noktasında bir an duraklayın, ardından vücudunuzu yavaşça başlangıç ​​pozisyonuna indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Sujeta la barra de dominadas con un agarre prono, un poco más ancho que la altura de los hombros.","Cuélgate de la barra con los brazos completamente extendidos y el cuerpo recto.","Activa los músculos de la espalda y tira de tu cuerpo hacia arriba, hacia la barra, manteniendo los codos cerca del cuerpo.","Continúa subiendo hasta que la barbilla quede por encima de la barra.","Haz una pausa por un momento en la parte superior, luego baja lentamente el cuerpo de vuelta a la posición inicial.","Repite el número de repeticiones deseado."]},"muscle_group":"biceps","secondary_muscles":["biceps","forearms"],"target":"lats","image":"images/0841-HMzLjXx.jpg","gif_url":"videos/0841-HMzLjXx.gif","created_at":"2026-03-18T12:31:32.906074+00:00"},{"id":"0857","name":"wheel rollerout","category":"waist","body_part":"waist","equipment":"wheel roller","instructions":{"en":"Kneel on the floor and place the wheel roller in front of you. Place your hands on the handles of the wheel roller and extend your arms straight out in front of you. Engage your core muscles and slowly roll the wheel forward, keeping your back straight and your abs tight. Continue rolling forward until your body is fully extended and your arms are overhead. Pause for a moment, then slowly roll the wheel back towards your knees, maintaining control and keeping your abs engaged. Repeat for the desired number of repetitions.","it":"Inginocchiati sul pavimento e posiziona il rullo davanti a te. Metti le mani sulle maniglie del rullo e allunga le braccia davanti a te. Coinvolgi i muscoli centrali e fai rotolare lentamente la ruota in avanti, mantenendo la schiena dritta e gli addominali tesi. Continua a rotolare in avanti finché il corpo non è completamente esteso e le braccia sono sopra la testa. Fai una pausa per un momento, quindi riporta lentamente la ruota verso le ginocchia, mantenendo il controllo e impegnando gli addominali. Ripetere per il numero di ripetizioni desiderato.","tr":"Yere diz çökün ve tekerlek silindirini önünüze yerleştirin. Ellerinizi tekerlek silindirinin tutamaklarına yerleştirin ve kollarınızı düz bir şekilde önünüze doğru uzatın. Çekirdek kaslarınızı devreye sokun ve sırtınızı düz ve karın kaslarınızı sıkı tutarak tekerleği yavaşça ileri doğru döndürün. Vücudunuz tamamen uzayıncaya ve kollarınız başınızın üstünde oluncaya kadar ileri doğru yuvarlanmaya devam edin. Bir an duraklayın, ardından kontrolü koruyarak ve karın kaslarınızı meşgul tutarak tekerleği yavaşça dizlerinize doğru döndürün. İstenilen sayıda tekrar için tekrarlayın.","es":"Arrodíllate en el suelo y coloca el rodillo frente a ti. Coloca las manos en las asas del rodillo y extiende los brazos rectos hacia adelante. Activa los músculos del core y haz rodar lentamente el rodillo hacia adelante, manteniendo la espalda recta y el abdomen contraído. Continúa rodando hacia delante hasta que el cuerpo esté completamente extendido y los brazos por encima de la cabeza. Haz una pausa de un momento, luego haz rodar lentamente el rodillo de regreso hacia las rodillas, manteniendo el control y el abdomen activado. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Kneel on the floor and place the wheel roller in front of you.","Place your hands on the handles of the wheel roller and extend your arms straight out in front of you.","Engage your core muscles and slowly roll the wheel forward, keeping your back straight and your abs tight.","Continue rolling forward until your body is fully extended and your arms are overhead.","Pause for a moment, then slowly roll the wheel back towards your knees, maintaining control and keeping your abs engaged.","Repeat for the desired number of repetitions."],"it":["Inginocchiati sul pavimento e posiziona il rullo davanti a te.","Metti le mani sulle maniglie del rullo e allunga le braccia davanti a te.","Coinvolgi i muscoli centrali e fai rotolare lentamente la ruota in avanti, mantenendo la schiena dritta e gli addominali tesi.","Continua a rotolare in avanti finché il corpo non è completamente esteso e le braccia sono sopra la testa.","Fai una pausa per un momento, quindi riporta lentamente la ruota verso le ginocchia, mantenendo il controllo e impegnando gli addominali.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Yere diz çökün ve tekerlek silindirini önünüze yerleştirin.","Ellerinizi tekerlek silindirinin tutamaklarına yerleştirin ve kollarınızı düz bir şekilde önünüze doğru uzatın.","Çekirdek kaslarınızı devreye sokun ve sırtınızı düz ve karın kaslarınızı sıkı tutarak tekerleği yavaşça ileri doğru döndürün.","Vücudunuz tamamen uzayıncaya ve kollarınız başınızın üstünde oluncaya kadar ileri doğru yuvarlanmaya devam edin.","Bir an duraklayın, ardından kontrolü koruyarak ve karın kaslarınızı meşgul tutarak tekerleği yavaşça dizlerinize doğru döndürün.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Arrodíllate en el suelo y coloca el rodillo frente a ti.","Coloca las manos en las asas del rodillo y extiende los brazos rectos hacia adelante.","Activa los músculos del core y haz rodar lentamente el rodillo hacia adelante, manteniendo la espalda recta y el abdomen contraído.","Continúa rodando hacia delante hasta que el cuerpo esté completamente extendido y los brazos por encima de la cabeza.","Haz una pausa de un momento, luego haz rodar lentamente el rodillo de regreso hacia las rodillas, manteniendo el control y el abdomen activado.","Repite el número de repeticiones deseado."]},"muscle_group":"lower back","secondary_muscles":["lower back"],"target":"abs","image":"images/0857-NAgVB3t.jpg","gif_url":"videos/0857-NAgVB3t.gif","created_at":"2026-03-18T12:31:32.90645+00:00"},{"id":"0739","name":"sled 45в° leg press","category":"upper legs","body_part":"upper legs","equipment":"sled machine","instructions":{"en":"Adjust the seat and footplate of the sled machine to a comfortable position. Sit on the sled machine with your back against the backrest and your feet shoulder-width apart on the footplate. Grip the handles on the sides of the seat for stability. Push the footplate away from your body by extending your legs, keeping your heels on the footplate. Continue pushing until your legs are almost fully extended, but without locking your knees. Pause for a moment at the top of the movement, then slowly lower the footplate back towards your body by bending your knees. Repeat for the desired number of repetitions.","it":"Regolare il sedile e la pedana della macchina da slitta in una posizione comoda. Sedersi sulla macchina da slitta con la schiena contro lo schienale e i piedi alla larghezza delle spalle sulla pedana. Afferrare le maniglie ai lati del sedile per garantire stabilità. Allontanare la pedana dal corpo estendendo le gambe e mantenendo i talloni sulla pedana. Continua a spingere finché le gambe non sono quasi completamente estese, ma senza bloccare le ginocchia. Fare una pausa per un momento nella parte superiore del movimento, quindi abbassare lentamente la pedana verso il corpo piegando le ginocchia. Ripetere per il numero di ripetizioni desiderato.","tr":"Kızak makinesinin koltuğunu ve ayak plakasını rahat bir konuma ayarlayın. Sırtınız koltuk arkalığına dayalı ve ayaklarınız taban plakasında omuz genişliğinde açık olacak şekilde kızak makinesine oturun. Denge için koltuğun yanlarındaki tutamakları tutun. Topuklarınızı taban plakası üzerinde tutarak bacaklarınızı uzatarak taban plakasını vücudunuzdan uzağa doğru itin. Bacaklarınız neredeyse tamamen uzayıncaya kadar, ancak dizlerinizi kilitlemeden itmeye devam edin. Hareketin en üst noktasında bir an duraklayın, ardından dizlerinizi bükerek ayak plakasını yavaşça vücudunuza doğru indirin. İstenilen sayıda tekrar için tekrarlayın.","es":"Ajusta el asiento y la placa de la máquina de trineo a una posición cómoda. Siéntate en la máquina de trineo con la espalda contra el respaldo y los pies separados a la altura de los hombros sobre la placa. Sujeta las asas a los lados del asiento para mayor estabilidad. Empuja la placa alejándola de tu cuerpo extendiendo las piernas, manteniendo los talones sobre la placa. Continúa empujando hasta que las piernas estén casi completamente extendidas, pero sin bloquear las rodillas. Haz una pausa por un momento en la parte alta del movimiento, luego baja lentamente la placa de vuelta hacia tu cuerpo doblando las rodillas. Repite el número de repeticiones deseado."},"instruction_steps":{"en":["Adjust the seat and footplate of the sled machine to a comfortable position.","Sit on the sled machine with your back against the backrest and your feet shoulder-width apart on the footplate.","Grip the handles on the sides of the seat for stability.","Push the footplate away from your body by extending your legs, keeping your heels on the footplate.","Continue pushing until your legs are almost fully extended, but without locking your knees.","Pause for a moment at the top of the movement, then slowly lower the footplate back towards your body by bending your knees.","Repeat for the desired number of repetitions."],"it":["Regolare il sedile e la pedana della macchina da slitta in una posizione comoda.","Sedersi sulla macchina da slitta con la schiena contro lo schienale e i piedi alla larghezza delle spalle sulla pedana.","Afferrare le maniglie ai lati del sedile per garantire stabilità.","Allontanare la pedana dal corpo estendendo le gambe e mantenendo i talloni sulla pedana.","Continua a spingere finché le gambe non sono quasi completamente estese, ma senza bloccare le ginocchia.","Fare una pausa per un momento nella parte superiore del movimento, quindi abbassare lentamente la pedana verso il corpo piegando le ginocchia.","Ripetere per il numero di ripetizioni desiderato."],"tr":["Kızak makinesinin koltuğunu ve ayak plakasını rahat bir konuma ayarlayın.","Sırtınız koltuk arkalığına dayalı ve ayaklarınız taban plakasında omuz genişliğinde açık olacak şekilde kızak makinesine oturun.","Denge için koltuğun yanlarındaki tutamakları tutun.","Topuklarınızı taban plakası üzerinde tutarak bacaklarınızı uzatarak taban plakasını vücudunuzdan uzağa doğru itin.","Bacaklarınız neredeyse tamamen uzayıncaya kadar, ancak dizlerinizi kilitlemeden itmeye devam edin.","Hareketin en üst noktasında bir an duraklayın, ardından dizlerinizi bükerek ayak plakasını yavaşça vücudunuza doğru indirin.","İstenilen sayıda tekrar için tekrarlayın."],"es":["Ajusta el asiento y la placa de la máquina de trineo a una posición cómoda.","Siéntate en la máquina de trineo con la espalda contra el respaldo y los pies separados a la altura de los hombros sobre la placa.","Sujeta las asas a los lados del asiento para mayor estabilidad.","Empuja la placa alejándola de tu cuerpo extendiendo las piernas, manteniendo los talones sobre la placa.","Continúa empujando hasta que las piernas estén casi completamente extendidas, pero sin bloquear las rodillas.","Haz una pausa por un momento en la parte alta del movimiento, luego baja lentamente la placa de vuelta hacia tu cuerpo doblando las rodillas.","Repite el número de repeticiones deseado."]},"muscle_group":"quadriceps","secondary_muscles":["quadriceps","hamstrings","calves"],"target":"glutes","image":"images/0739-10Z2DXU.jpg","gif_url":"videos/0739-10Z2DXU.gif","created_at":"2026-03-18T12:31:32.890171+00:00"}];
